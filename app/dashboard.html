<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trang chủ — ERP AIS</title>
<link rel="manifest" href="manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ERP AIS" />
<link rel="apple-touch-icon" href="assets/icon-192.png" />
<meta name="theme-color" content="#0094D9" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/tokens.css" />
<link rel="stylesheet" href="css/dashboard.css" />
</head>
<body data-page="dashboard.html" class="hub-body">

<!-- Trang chủ / màn hình chọn phòng ban: KHÔNG dùng sidebar, hiển thị full
     màn hình kiểu app di động — đúng yêu cầu "giao diện chọn không sidebar". -->
<header class="hub-topbar">
  <div class="hub-topbar__brand">
    <span class="dot" aria-hidden="true"></span>
    <div>ERP AIS<small data-i18n="brand.subtitle">Hệ thống quản trị nội bộ</small></div>
  </div>
  <div class="hub-topbar__right">
    <button class="icon-btn" data-i18n-title="nav.notifications" title="Thông báo" onclick="location.href='notifications.html'">
      🔔
      <span class="badge" id="notifBadge" style="display:none;">0</span>
    </button>
    <div class="user-chip" onclick="location.href='profile.html'">
      <div class="user-chip__avatar" id="userChipAvatar">--</div>
      <div class="user-chip__meta">
        <div class="name" id="userChipName">Đang tải...</div>
        <div class="role" id="userChipRole">—</div>
      </div>
    </div>
    <button class="icon-btn" data-i18n-title="common.logout" title="Đăng xuất" id="logoutBtn">⎋</button>
  </div>
</header>

<main class="hub-main">
  <div class="birthday-banner" id="birthdayBanner">
    <div class="birthday-banner__icon">🎂</div>
    <div class="birthday-banner__text">
      <strong data-i18n="dashboard.birthday">Chúc mừng sinh nhật!</strong>
      <p id="birthdayText"></p>
    </div>
  </div>

  <div class="install-guide-card" id="installBanner" style="display:none;">
    <div class="install-guide-card__icon">📲</div>
    <div class="install-guide-card__text">
      <strong>Cài ứng dụng về máy để dùng nhanh hơn</strong>
      <span>Xem hướng dẫn cho iPhone, Android, Windows, macOS</span>
    </div>
    <div class="install-guide-card__arrow">›</div>
  </div>

  <div class="stat-grid hub-stats">
    <div class="stat-card">
      <div class="label" data-i18n="dashboard.statUnread">Thông báo chưa đọc</div>
      <div class="value mono" id="statUnread">–</div>
    </div>
    <div class="stat-card">
      <div class="label" data-i18n="dashboard.statLeave">Ngày phép còn lại</div>
      <div class="value mono" id="statLeave">–</div>
    </div>
    <div class="stat-card" id="statPendingCard">
      <div class="label" data-i18n="dashboard.statPending">Phiếu đang chờ duyệt</div>
      <div class="value mono" id="statPending">–</div>
    </div>
    <div class="stat-card">
      <div class="label" data-i18n="dashboard.statMeetings">Cuộc họp sắp tới</div>
      <div class="value mono" id="statMeetings">–</div>
    </div>
  </div>

  <h2 class="hub-section-title" data-i18n="dashboard.apps">Phòng ban</h2>
  <div class="app-hub" id="appHub"><!-- render bởi js/dashboard.js theo quyền --></div>

  <h2 class="hub-section-title" data-i18n="dashboard.quickLinks">Truy cập nhanh</h2>
  <div class="app-hub app-hub--small" id="quickHub"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="js/dashboard.js"></script>
<script src="js/pwa.js"></script>
</body>
</html>
