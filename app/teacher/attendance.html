<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Điểm danh — ERP AIS</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
<style>
  .attendance-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .attendance-row:last-child { border-bottom: none; }
  .attendance-toggle { display: inline-flex; border: 1.5px solid var(--border-strong); border-radius: 999px; overflow: hidden; }
  .attendance-toggle button { border: none; background: #fff; padding: 6px 14px; font-size: 12.5px; font-weight: 700; cursor: pointer; color: var(--muted); }
  .attendance-toggle button.present.active { background: var(--success-tint); color: var(--success); }
  .attendance-toggle button.absent.active { background: var(--danger-tint); color: var(--danger); }
</style>
</head>
<body data-page="/teacher/attendance.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>ERP AIS<small>Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 ERP AIS</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <div class="search-box"><span>🔎</span><input type="text" placeholder="Tìm kiếm..." /></div>
    </div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'">🔔<span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn">⎋</button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1>Điểm danh</h1><div class="sub" id="classHint">Chọn lớp và buổi học.</div></div>
    </div>

    <div class="toolbar">
      <div class="toolbar__filters">
        <select class="select-input" id="classSelect"></select>
        <input type="date" class="select-input" id="sessionDate" />
      </div>
      <button class="btn btn-accent btn-sm" id="btnSave">💾 Lưu điểm danh</button>
    </div>

    <div class="data-table-wrap">
      <div id="attendanceList"><div class="empty-cell">Đang tải...</div></div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script type="module" src="/teacher/attendance.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
