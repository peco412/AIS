<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AIS OFFICE — Mặt tiền toà nhà</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#0F172A" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Orbitron:wght@600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: radial-gradient(ellipse 1000px 700px at 50% 20%, rgba(34,211,238,0.08) 0%, transparent 60%), linear-gradient(180deg, #0F172A 0%, #16213a 45%, #1E293B 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    min-height: 100vh; padding: 40px 16px 28px; overflow-x: hidden; position: relative;
  }
  /* Vet sang mo phia sau tao chieu sau */
  .bg-streak { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.5; }

  .ws-header { text-align: center; margin-bottom: 4px; opacity: 0; animation: fu 0.7s var(--ease-spring) 0.05s forwards; position: relative; z-index: 1; }
  .ws-eyebrow { font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: #22D3EE; margin-bottom: 10px; text-shadow: 0 0 12px rgba(34,211,238,0.5); }
  .ws-title { font-family: 'Orbitron', sans-serif; font-size: 26px; font-weight: 700; color: #F1F5F9; letter-spacing: 0.02em; }
  .ws-title span { color: #22D3EE; }
  .ws-sub { font-size: 13px; color: #94A3B8; margin-top: 8px; }

  .ws-stage { width: 100%; max-width: 760px; margin-top: 4px; opacity: 0; animation: fu 0.8s var(--ease-spring) 0.15s forwards; position: relative; z-index: 1; }
  .ws-stage svg { width: 100%; height: auto; display: block; overflow: visible; }

  #buildingScene { transition: transform 1.1s cubic-bezier(0.65,0,0.35,1), opacity 0.9s ease; transform-origin: 500px 460px; }
  #buildingScene.is-entering { transform: scale(3.2) translateY(60px); opacity: 0; }

  /* Anh sang phan chieu theo con tro chuot */
  #cursorGlow { pointer-events: none; transition: opacity 0.3s ease; opacity: 0; mix-blend-mode: screen; }
  .ws-stage:hover #cursorGlow { opacity: 0.55; }

  #doorGroup { cursor: pointer; }
  .door-label { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 0.15em; fill: #22D3EE; text-anchor: middle; text-shadow: 0 0 8px #22D3EE; animation: ws-pulse 2s ease-in-out infinite; }
  @keyframes ws-pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
  .door-path-light { stroke-dasharray: 4 6; animation: dash-flow 1.2s linear infinite; }
  @keyframes dash-flow { to { stroke-dashoffset: -20; } }

  .kiosk-group { cursor: pointer; }
  .kiosk-scan-ring { animation: scan-pulse 2.2s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
  @keyframes scan-pulse { 0% { transform: scale(0.85); opacity: 0.9; } 100% { transform: scale(1.6); opacity: 0; } }

  .ws-footer { margin-top: 10px; font-size: 12px; color: #94A3B8; text-align: center; opacity: 0; animation: fu 0.6s var(--ease-spring) 0.4s forwards; position: relative; z-index: 1; }
  .ws-footer button { background: none; border: none; color: #22D3EE; font-weight: 600; font-size: 12px; cursor: pointer; text-decoration: underline; padding: 0; }

  /* Glass Kiosk check-in card */
  .ws-checkin {
    width: 100%; max-width: 380px; margin-top: 6px; background: rgba(15,23,42,0.55); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(34,211,238,0.3); border-radius: 20px; box-shadow: 0 24px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
    padding: 20px 22px; animation: fu 0.4s var(--ease-spring) forwards; position: relative; z-index: 2;
  }
  .ws-checkin__head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .ws-checkin__title { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 14px; color: #F1F5F9; letter-spacing: 0.03em; }
  .ws-checkin__center { font-size: 11.5px; color: #94A3B8; margin-top: 4px; }
  .ws-checkin__close { background: none; border: none; color: #94A3B8; font-size: 15px; cursor: pointer; padding: 2px 6px; }
  .ws-checkin__hint { font-size: 12px; margin-bottom: 8px; color: #CBD5E1; }
  .ws-checkin__error { font-size: 12px; color: #FCA5A5; background: rgba(239,68,68,0.14); border-radius: 10px; padding: 8px 10px; margin-bottom: 8px; }
  .ws-checkin__status { font-size: 12.5px; font-weight: 600; margin-bottom: 12px; color: #67E8F9; }
  .ws-checkin__actions { display: flex; gap: 10px; }
  .ws-checkin__btn { flex: 1; padding: 11px; border-radius: 12px; border: none; font-weight: 700; font-size: 13px; cursor: pointer; transition: opacity 0.15s, transform 0.15s; }
  .ws-checkin__btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .ws-checkin__btn:not(:disabled):active { transform: scale(0.97); }
  .ws-checkin__btn--in { background: linear-gradient(135deg, #22D3EE, #0891B2); color: #0F172A; box-shadow: 0 0 20px rgba(34,211,238,0.4); }
  .ws-checkin__btn--out { background: rgba(255,255,255,0.06); color: #F1F5F9; border: 1px solid rgba(255,255,255,0.14); }
  .ws-checkin__more { display: block; text-align: center; margin-top: 12px; font-size: 11px; color: #64748B; }

  @keyframes fu { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) {
    .ws-header, .ws-stage, .ws-footer, .ws-checkin { animation: none !important; opacity: 1 !important; }
    #buildingScene, .kiosk-scan-ring, .door-label, .door-path-light { animation: none !important; transition: none !important; }
  }

  /* MOI — Sanh chinh (Screen 2 tam thoi) — se lam rieng ban ky hon o
     buoc sau, hien tai dung the kinh (glassmorphism) dong bo mau sac
     man 1. */
  .ws-branches {
    position: absolute; inset: 0; display: none; grid-template-columns: repeat(2, 1fr); gap: 16px;
    align-content: center; justify-items: center; padding: 20px; z-index: 3;
  }
  .ws-branches.is-visible { display: grid; }
  .ws-branch-card {
    width: 100%; max-width: 220px; background: rgba(15,23,42,0.55); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(148,163,184,0.25); border-radius: 18px; padding: 22px 18px; text-align: center;
    cursor: pointer; opacity: 0; transform: translateY(16px) scale(0.94);
    animation: branch-in 0.5s var(--ease-spring) forwards;
    transition: border-color 0.25s var(--ease), transform 0.25s var(--ease-spring), box-shadow 0.25s var(--ease);
  }
  .ws-branch-card:hover { border-color: rgba(34,211,238,0.6); transform: translateY(-4px) scale(1.02); box-shadow: 0 16px 32px rgba(34,211,238,0.15); }
  .ws-branch-card--locked { cursor: not-allowed; opacity: 0.4 !important; filter: grayscale(0.7); }
  .ws-branch-card--locked:hover { transform: none; border-color: rgba(148,163,184,0.25); box-shadow: none; }
  .ws-branch-card__icon { font-size: 30px; margin-bottom: 10px; }
  .ws-branch-card__name { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 16px; color: #F1F5F9; letter-spacing: 0.03em; }
  .ws-branch-card__desc { font-size: 10.5px; color: #67E8F9; margin-top: 5px; letter-spacing: 0.04em; }
  .ws-branch-card__lock { font-size: 10.5px; color: #94A3B8; margin-top: 6px; }
  @keyframes branch-in { from { opacity: 0; transform: translateY(16px) scale(0.94); } to { opacity: 1; transform: translateY(0) scale(1); } }

  .ws-back-btn { display: none; margin: 6px auto 0; background: none; border: none; color: #94A3B8; font-size: 12px; cursor: pointer; text-decoration: underline; position: relative; z-index: 3; }
  .ws-back-btn.is-visible { display: block; }
</style>
</head>
