<title>AIS OFFICE — Cổng vào hệ thống</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1a1530" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<link rel="stylesheet" href="/css/tokens.css" />
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background:
      radial-gradient(ellipse 900px 500px at 50% 0%, rgba(212,175,110,0.16) 0%, transparent 65%),
      linear-gradient(180deg, #1c1730 0%, #2c2140 22%, #4a3450 42%, #8a5a52 64%, #d69a5e 84%, #f0bf7d 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    min-height: 100vh; padding: 40px 16px 28px;
    overflow-x: hidden;
  }

  .ws-header { text-align: center; margin-bottom: 4px; opacity: 0; animation: ws-fade-up 0.7s var(--ease-spring) 0.05s forwards; }
  .ws-eyebrow { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase; color: #e3c68a; margin-bottom: 10px; }
  .ws-title { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; color: #fbf3e4; }
  .ws-title span { color: #e3c68a; font-style: italic; }
  .ws-sub { font-size: 13px; color: #d8c9c2; margin-top: 8px; }

  .ws-stage { width: 100%; max-width: 760px; margin-top: 4px; opacity: 0; animation: ws-fade-up 0.8s var(--ease-spring) 0.15s forwards; position: relative; }
  .ws-stage svg { width: 100%; height: auto; display: block; overflow: visible; }

  #buildingScene { transition: opacity 0.5s var(--ease), transform 0.5s var(--ease-spring); transform-origin: 500px 460px; }
  #buildingScene.is-entering { opacity: 0; transform: scale(0.92) translateY(-10px); pointer-events: none; }

  #doorGroup { cursor: pointer; }
  #doorGroup .door-glow { transition: opacity 0.4s var(--ease); }
  #doorGroup:hover .door-glow { opacity: 0.55; }
  #doorGroup:hover #doorRect { filter: brightness(1.25); }
  #doorRect { transition: filter 0.3s var(--ease); }
  .ws-entry-hint { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 600; font-size: 13px; fill: #e3c68a; text-anchor: middle; animation: ws-pulse 2.2s ease-in-out infinite; }
  @keyframes ws-pulse { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }

  .ws-checkin-trigger { cursor: pointer; }
  .ws-checkin-trigger:hover .ci-lamp-glow { opacity: 0.5; }

  .ws-branches {
    position: absolute; inset: 0; display: none; grid-template-columns: repeat(2, 1fr); gap: 16px;
    align-content: center; justify-items: center; padding: 20px;
  }
  .ws-branches.is-visible { display: grid; }
  .ws-branch-card {
    width: 100%; max-width: 220px; background: rgba(28,22,40,0.85); backdrop-filter: blur(10px);
    border: 1px solid rgba(227,198,138,0.22); border-radius: 18px; padding: 22px 18px; text-align: center;
    cursor: pointer; opacity: 0; transform: translateY(16px) scale(0.94);
    animation: ws-branch-in 0.5s var(--ease-spring) forwards;
    transition: border-color 0.25s var(--ease), transform 0.25s var(--ease-spring), box-shadow 0.25s var(--ease);
  }
  .ws-branch-card:hover { border-color: rgba(227,198,138,0.55); transform: translateY(-4px) scale(1.02); box-shadow: 0 16px 32px rgba(0,0,0,0.35); }
  .ws-branch-card--locked { cursor: not-allowed; opacity: 0.45 !important; filter: grayscale(0.7); }
  .ws-branch-card--locked:hover { transform: none; border-color: rgba(227,198,138,0.22); box-shadow: none; }
  .ws-branch-card__icon { font-size: 30px; margin-bottom: 10px; }
  .ws-branch-card__name { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 17px; color: #fbf3e4; }
  .ws-branch-card__desc { font-size: 11px; color: #cfa96a; margin-top: 4px; letter-spacing: 0.02em; }
  .ws-branch-card__lock { font-size: 10.5px; color: #c9b8ae; margin-top: 6px; }
  @keyframes ws-branch-in { from { opacity: 0; transform: translateY(16px) scale(0.94); } to { opacity: 1; transform: translateY(0) scale(1); } }

  .ws-back-btn {
    display: none; margin: 6px auto 0; background: none; border: none; color: #cbb9ae; font-size: 12px;
    cursor: pointer; text-decoration: underline;
  }
  .ws-back-btn.is-visible { display: block; }

  .ws-footer { margin-top: 10px; font-size: 12px; color: #cbb9ae; text-align: center; opacity: 0; animation: ws-fade-up 0.6s var(--ease-spring) 0.4s forwards; }
  .ws-footer button { background: none; border: none; color: #e3c68a; font-weight: 600; font-size: 12px; cursor: pointer; text-decoration: underline; padding: 0; }

  .ws-checkin {
    width: 100%; max-width: 380px; margin-top: 6px; background: rgba(28, 22, 40, 0.92); backdrop-filter: blur(12px);
    border: 1px solid rgba(227, 198, 138, 0.25); border-radius: 18px; box-shadow: 0 20px 48px rgba(0,0,0,0.4);
    padding: 20px 22px; animation: ws-settle 0.4s var(--ease-spring) forwards;
  }
  .ws-checkin__head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .ws-checkin__title { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 16px; color: #fbf3e4; }
  .ws-checkin__center { font-size: 11.5px; color: #cbb9ae; margin-top: 3px; }
  .ws-checkin__close { background: none; border: none; color: #cbb9ae; font-size: 15px; cursor: pointer; padding: 2px 6px; }
  .ws-checkin__hint { font-size: 12px; margin-bottom: 8px; color: #d8c9c2; }
  .ws-checkin__error { font-size: 12px; color: #ffb4a8; background: rgba(255,90,70,0.14); border-radius: 10px; padding: 8px 10px; margin-bottom: 8px; }
  .ws-checkin__status { font-size: 12.5px; font-weight: 600; margin-bottom: 12px; color: #f0d9a8; }
  .ws-checkin__actions { display: flex; gap: 10px; }
  .ws-checkin__btn { flex: 1; padding: 11px; border-radius: 12px; border: none; font-weight: 700; font-size: 13px; cursor: pointer; transition: opacity 0.15s, transform 0.15s; }
  .ws-checkin__btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .ws-checkin__btn:not(:disabled):active { transform: scale(0.97); }
  .ws-checkin__btn--in { background: linear-gradient(135deg, #e3c68a, #c9a45f); color: #241c14; }
  .ws-checkin__btn--out { background: rgba(255,255,255,0.08); color: #fbf3e4; border: 1px solid rgba(255,255,255,0.14); }
  .ws-checkin__more { display: block; text-align: center; margin-top: 12px; font-size: 11px; color: #b8a89c; }

  @keyframes ws-fade-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes ws-settle { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  @media (prefers-reduced-motion: reduce) {
    .ws-header, .ws-stage, .ws-footer, .ws-checkin, .ws-branch-card { animation: none !important; opacity: 1 !important; transform: none !important; }
    #buildingScene, .ws-branch-card { transition: none !important; }
  }
</style>
