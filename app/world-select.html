<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chọn thế giới — AIS OFFICE</title>
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="AIS OFFICE" />
<link rel="apple-touch-icon" href="/assets/icon-192.png" />
<meta name="theme-color" content="#0094D9" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/world-select.css" />
</head>
<body data-page="world-select.html" class="hub-body">

<header class="hub-topbar">
  <div class="hub-topbar__brand">
    <span class="dot" aria-hidden="true"></span>
    <div>AIS OFFICE<small>Chọn khu vực làm việc</small></div>
  </div>
</header>

<main class="hub-main">
  <div class="hero-greeting" id="heroGreeting">
    <div class="hero-greeting__text">
      <div class="hero-greeting__eyebrow" id="greetingEyebrow">Chào buổi sáng</div>
      <h1 class="hero-greeting__title">AIS OFFICE, <span id="userNameSpan">bạn</span></h1>
      <div class="hero-greeting__sub">Hôm nay bạn muốn bắt đầu từ đâu?</div>
    </div>
  </div>

  <div class="install-guide-card" id="checkinTrigger" role="button" tabindex="0" aria-label="Chấm công nhanh tại cổng">
    <div class="install-guide-card__icon"><svg class="icon" viewBox="0 0 24 24"><path d="M12 21s-7-6.1-7-11a7 7 0 0 1 14 0c0 4.9-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg></div>
    <div class="install-guide-card__text">
      <strong>Chấm công nhanh tại cổng</strong>
      <span>Không cần vào ERP — chấm công vào/ra ngay tại đây</span>
    </div>
    <div class="install-guide-card__arrow">›</div>
  </div>

  <div class="checkin-panel" id="checkinCard" style="display:none;">
    <div class="checkin-panel__head">
      <div>
        <div class="checkin-panel__title">Chấm công nhanh</div>
        <div class="checkin-panel__center" id="ciCenterName">—</div>
      </div>
      <button class="checkin-panel__close" id="btnCloseCheckin" aria-label="Đóng">✕</button>
    </div>
    <div class="checkin-panel__hint" id="ciGpsHint">Đang xác định vị trí...</div>
    <div class="checkin-panel__error" id="ciError" style="display:none;"></div>
    <div class="checkin-panel__status" id="ciStatus"></div>
    <div class="checkin-panel__actions">
      <button class="checkin-panel__btn checkin-panel__btn--in" id="btnCiIn" disabled>Chấm công vào</button>
      <button class="checkin-panel__btn checkin-panel__btn--out" id="btnCiOut" disabled style="display:none;">Chấm công ra</button>
    </div>
    <a href="/attendance-checkin.html" class="checkin-panel__more">Xem đầy đủ lịch sử chấm công →</a>
  </div>

  <h2 class="hub-section-title">Khu vực làm việc</h2>
  <div class="app-hub app-hub--world" id="worldHub"><!-- render bởi js/worldSelect.js theo quyền, dùng chung WORLD_META với world-switcher --></div>

  <div class="hub-footer" id="footerBar">Bấm vào 1 khu vực để bắt đầu · <button id="btnSkip">Vào thẳng ERP như mọi khi</button></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/js/worldSelect.js"></script>
</body>
</html>
