<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Thông báo — ERP AIS</title>
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ERP AIS" />
<link rel="apple-touch-icon" href="/assets/icon-192.png" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
<style>
  .notif-item { display: flex; gap: 14px; padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--surface-card); }
  .notif-item.unread { background: var(--accent-tint); }
  .notif-item:last-child { border-bottom: none; }
  .notif-scope-icon { font-size: 20px; }
  .notif-body { flex: 1; }
  .notif-title { font-weight: 700; font-size: 14px; margin-bottom: 3px; }
  .notif-content { font-size: 13px; color: var(--ink-soft); }
  .notif-meta { font-size: 11.5px; color: var(--muted); margin-top: 6px; }
</style>
</head>
<body data-page="/notifications.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>ERP AIS<small data-i18n="brand.subtitle">Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 ERP AIS</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <div class="search-box"><span>🔎</span><input type="text" placeholder="Tìm kiếm..." /></div>
    </div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'">🔔<span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn">⎋</button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1>Thông báo</h1><div class="sub">Chia theo toàn hệ thống, trung tâm, phòng ban, và cá nhân.</div></div>
      <button class="btn btn-outline btn-sm" id="btnMarkAll">Đánh dấu tất cả đã đọc</button>
    </div>

    <div class="toolbar">
      <select class="select-input" id="filterScope">
        <option value="">Tất cả</option>
        <option value="system">Toàn hệ thống</option>
        <option value="center">Trung tâm</option>
        <option value="department">Phòng ban</option>
        <option value="personal">Cá nhân</option>
      </select>
      <select class="select-input" id="filterCategory">
        <option value="">Tất cả nghiệp vụ</option>
        <option value="Nhân sự">👥 Nhân sự</option>
        <option value="Kế toán">💰 Kế toán</option>
        <option value="CSVC">🔧 CSVC</option>
        <option value="Truyền thông">📣 Truyền thông</option>
        <option value="Học vụ / Học phí">🎓 Học vụ / Học phí</option>
        <option value="Ban điều hành">🏛️ Ban điều hành</option>
        <option value="Khác">🔔 Khác</option>
      </select>
      <div class="cell-muted" id="resultCount"></div>
    </div>

    <div class="data-table-wrap" id="notifList">
      <div class="empty-cell">Đang tải dữ liệu...</div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/notifications.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
