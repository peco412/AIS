<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Danh sách lớp — AIS OFFICE</title>
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="AIS OFFICE" />
<link rel="apple-touch-icon" href="/assets/icon-192.png" />
<meta name="theme-color" content="#0094D9" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
</head>
<body data-page="/edu/classes.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>AIS OFFICE<small data-i18n="brand.subtitle">Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 AIS OFFICE</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left">
      <button class="menu-toggle" id="menuToggle"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg></button>
      </div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'"><svg class="icon" viewBox="0 0 24 24"><path d="M6 8a6 6 0 1 1 12 0c0 4 1.5 6 2 6.5H4c.5-.5 2-2.5 2-6.5z"/><path d="M9.5 18a2.5 2.5 0 0 0 5 0"/></svg><span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn"><svg class="icon" viewBox="0 0 24 24"><path d="M9 4H5a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h4"/><path d="M15 16l4-4-4-4"/><path d="M19 12H9"/></svg></button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1>Danh sách lớp</h1><div class="sub" id="centerHint">Trung tâm: —</div></div>
      <button class="btn btn-accent" id="btnAdd">+ Thêm lớp</button>
    </div>

    <div class="toolbar">
      <div class="toolbar__filters">
        <input type="text" class="text-input" id="searchInput" placeholder="Tìm tên lớp..." style="max-width:260px;" />
        <select class="select-input" id="filterProgram"><option value="">Tất cả chương trình</option></select>
        <select class="select-input" id="filterStatus">
          <option value="">Tất cả trạng thái</option>
          <option value="active">Đang học</option>
          <option value="completed">Đã kết thúc</option>
          <option value="cancelled">Đã huỷ</option>
        </select>
      </div>
      <div class="cell-muted" id="resultCount"></div>
    </div>

    <div class="data-table-wrap">
      <table class="data-table">
        <thead><tr><th>Mã lớp</th><th>Tên lớp</th><th>Chương trình / Cấp độ / Khoá</th><th>Giáo viên</th><th>Sĩ số</th><th>Khai giảng</th><th data-i18n="common.status">Trạng thái</th><th></th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="8" class="empty-cell">Đang tải dữ liệu...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<div class="modal-overlay" id="classModal">
  <div class="modal-box">
    <button class="modal-close" id="closeModal"><svg class="icon icon--sm" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    <h3 id="modalTitle">Thêm lớp</h3>
    <div class="form-error" id="formError"></div>
    <form id="classForm">
      <input type="hidden" id="classId" />
      <div class="field"><label for="className">Tên lớp *</label><input type="text" id="className" required /></div>
      <div class="field-grid-2">
        <div class="field"><label for="program">Chương trình *</label><select id="program" required></select></div>
        <div class="field"><label for="level">Cấp độ</label><select id="level"><option value="">—</option></select></div>
      </div>
      <div class="field-grid-2">
        <div class="field"><label for="sublevel">Cấp độ con</label><select id="sublevel"><option value="">—</option></select></div>
        <div class="field"><label for="course">Khoá</label><select id="course"><option value="">—</option></select></div>
      </div>
      <div class="field"><label for="teacher">Giáo viên phụ trách</label><select id="teacher"><option value="">— Chưa phân công —</option></select></div>
      <div class="field"><label for="scheduleNote">Lịch học (mô tả)</label><input type="text" id="scheduleNote" placeholder="VD: T2-4-6, 18h00-19h30" /></div>
      <div class="field">
        <label>Các ngày học trong tuần</label>
        <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:4px;">
          <label class="field-checkbox" style="display:inline-flex;"><input type="checkbox" class="day-of-week" value="1" /> T2</label>
          <label class="field-checkbox" style="display:inline-flex;"><input type="checkbox" class="day-of-week" value="2" /> T3</label>
          <label class="field-checkbox" style="display:inline-flex;"><input type="checkbox" class="day-of-week" value="3" /> T4</label>
          <label class="field-checkbox" style="display:inline-flex;"><input type="checkbox" class="day-of-week" value="4" /> T5</label>
          <label class="field-checkbox" style="display:inline-flex;"><input type="checkbox" class="day-of-week" value="5" /> T6</label>
          <label class="field-checkbox" style="display:inline-flex;"><input type="checkbox" class="day-of-week" value="6" /> T7</label>
          <label class="field-checkbox" style="display:inline-flex;"><input type="checkbox" class="day-of-week" value="7" /> CN</label>
        </div>
      </div>
      <div class="field-grid-2">
        <div class="field"><label for="classStartTime">Giờ bắt đầu</label><input type="time" id="classStartTime" /></div>
        <div class="field"><label for="classEndTime">Giờ kết thúc</label><input type="time" id="classEndTime" /></div>
      </div>
      <div class="field-grid-2">
        <div class="field"><label for="startDate">Ngày khai giảng</label><input type="date" id="startDate" /></div>
        <div class="field"><label for="endDate">Ngày kết thúc (dự kiến)</label><input type="date" id="endDate" /></div>
      </div>
      <div class="field field-checkbox">
        <label for="autoGenSchedule"><input type="checkbox" id="autoGenSchedule" /> Tự động tạo lịch điểm danh &amp; lịch tuần giáo viên cho cả khoá học</label>
        <p class="cell-muted" style="margin-top:6px;">Cần đầy đủ: Ngày khai giảng, Ngày kết thúc, ít nhất 1 ngày học/tuần, Giáo viên phụ trách.</p>
      </div>
      <div class="field">
        <label for="status">Trạng thái</label>
        <select id="status"><option value="active">Đang học</option><option value="completed">Đã kết thúc</option><option value="cancelled">Đã huỷ</option></select>
      </div>
      <div class="field"><label for="note">Ghi chú</label><textarea id="note" rows="2"></textarea></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" id="cancelModal"><span data-i18n="common.cancel">Huỷ</span></button>
        <button type="submit" class="btn btn-accent" id="submitClass"><span data-i18n="common.save">Lưu</span></button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/edu/classes.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
