<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Thu học phí — ERP AIS</title>
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ERP AIS" />
<link rel="apple-touch-icon" href="/assets/icon-192.png" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
<style>
  /* Gọn lại giao diện thu học phí — 1 khối thông tin học sinh rõ ràng, hết */
  .tuition-student-card {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px;
    background: var(--surface-card); border: 1px solid var(--border); border-radius: var(--radius-md);
    padding: 16px 20px; margin-bottom: 18px;
  }
  .tuition-student-card__name { font-size: 16px; font-weight: 700; }
  .tuition-student-card__wallet { font-family: var(--font-mono); font-size: 15px; color: var(--success); }
  .plan-radio-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .plan-radio-option {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer;
  }
  .plan-radio-option:has(input:checked) { border-color: var(--accent); background: var(--accent-tint); }
  .plan-radio-option input { margin: 0; }
</style>
</head>
<body data-page="/edu/wallet-invoices.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>ERP AIS<small data-i18n="brand.subtitle">Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 ERP AIS</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left"><button class="menu-toggle" id="menuToggle">☰</button></div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'">🔔<span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn">⎋</button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1>Thu học phí</h1><div class="sub">Tìm học sinh → xem học phí → thu tiền qua Ví hoặc tại quầy.</div></div>
    </div>

    <div class="toolbar">
      <div class="toolbar__filters">
        <input class="text-input" type="text" id="searchStudent" placeholder="Tìm học sinh theo tên..." style="min-width:280px;" />
      </div>
    </div>
    <div id="searchFeedback" class="cell-muted" style="margin: -6px 0 14px; font-size:12.5px;"></div>
    <div id="searchResultsList" style="display:none; margin-bottom:16px;"></div>

    <div id="studentPanel" style="display:none;">
      <div class="tuition-student-card">
        <div>
          <div class="tuition-student-card__name" id="studentName"></div>
          <div class="cell-muted" id="studentCenter"></div>
          <div class="cell-muted" id="studentClass" style="font-size:11.5px;"></div>
          <div class="cell-muted" id="studentParent" style="font-size:11.5px; margin-top:2px;"></div>
        </div>
        <div style="text-align:right;">
          <div class="cell-muted" style="font-size:11.5px;">Số dư ví</div>
          <div class="tuition-student-card__wallet" id="walletBalance">–</div>
        </div>
        <button class="btn btn-accent btn-sm" id="btnNewInvoice">+ Tạo khoản thu mới</button>
      </div>

      <div class="data-table-wrap">
        <table class="data-table">
          <thead><tr><th>Khoản thu</th><th>Số tiền</th><th>Đã đóng</th><th>Còn nợ</th><th data-i18n="common.status">Trạng thái</th><th></th></tr></thead>
          <tbody id="invoiceBody"><tr><td colspan="6" class="empty-cell">Chọn học sinh để xem học phí.</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="createInvoiceModal">
  <div class="modal-box">
    <button class="modal-close" id="closeCreateModal">✕</button>
    <h3>Tạo khoản thu mới</h3>
    <div class="form-error" id="createError"></div>

    <div class="plan-radio-group">
      <label class="plan-radio-option"><input type="radio" name="planType" value="sublevel" checked /> <div><strong>Theo cấp độ con</strong><div class="cell-muted" style="font-size:11.5px;">Học tới đâu đóng tới đó</div></div></label>
      <label class="plan-radio-option"><input type="radio" name="planType" value="level" /> <div><strong>Trọn 1 cấp độ</strong><div class="cell-muted" style="font-size:11.5px;">Đóng gộp cả cấp độ, có ưu đãi riêng</div></div></label>
      <label class="plan-radio-option"><input type="radio" name="planType" value="program" /> <div><strong>Trọn chương trình</strong><div class="cell-muted" style="font-size:11.5px;">Đóng gộp cả chương trình, ưu đãi cao nhất</div></div></label>
    </div>

    <div id="planScopeField">
      <div class="field"><label for="planScopeSelect" id="planScopeLabel">Chọn cấp độ con</label><select id="planScopeSelect"></select></div>
      <p class="cell-muted" id="planPricePreview" style="margin-bottom:14px;"></p>
    </div>

    <!-- Cac truong nay ap dung CHUNG cho ca 3 hinh thuc thu (Theo khoa/
         Cap do/Chuong trinh) — dung dung "Mau du lieu nhap" trong dac ta,
         khong rieng cho 1 hinh thuc nao ca. -->
    <div class="field-grid-2">
      <div class="field"><label for="invYear">Năm</label><input type="number" id="invYear" /></div>
      <div class="field"><label for="invMonth">Tháng</label><input type="number" id="invMonth" min="1" max="12" /></div>
    </div>
    <div class="field" id="autoDiscountField" style="display:none;">
      <label>Ưu đãi tự động điền</label>
      <div class="cell-muted mono" id="autoDiscountDisplay" style="padding:8px 12px; background:var(--surface-sunken); border-radius:8px;">—</div>
    </div>
    <div class="field-grid-2">
      <div class="field"><label for="manualDiscountRate">Ưu đãi tay tự nhập (%)</label><input type="number" id="manualDiscountRate" min="0" max="100" step="0.1" value="0" /></div>
      <div class="field">
        <label for="specialCategory">Diện ưu đãi đặc biệt</label>
        <select id="specialCategory">
          <option value="">— Không —</option>
          <option value="board_child">Con HĐQT</option>
          <option value="board_grandchild">Cháu HĐQT</option>
          <option value="principal_child">Con Hiệu trưởng</option>
          <option value="other">Khác</option>
        </select>
      </div>
    </div>
    <div style="border-top:1px dashed var(--border); padding-top:10px; margin-top:4px;">
      <div class="field"><label for="netAmountInput">Tổng tiền (sau ưu đãi, VNĐ) *</label><input type="number" id="netAmountInput" min="0" /></div>
    </div>
    <div class="field"><label for="invDueDate">Hạn chót *</label><input type="date" id="invDueDate" /></div>

    <div id="paymentFields" style="border-top: 1px solid var(--border); padding-top: 14px; margin-top: 4px;">
      <div class="field-grid-2">
        <div class="field"><label for="hinhThucThu">Hình thức thu</label>
          <select id="hinhThucThu">
            <option value="CASH">Tiền mặt</option>
            <option value="BANK_TRANSFER">Chuyển khoản</option>
          </select>
        </div>
        <div class="field"><label for="invReceivedVnd">Tiền nhận (VNĐ) *</label><input type="number" id="invReceivedVnd" min="0" /></div>
      </div>
      <div class="batch-row" style="padding-top:4px;">
        <span class="cell-muted">Số tiền còn lại</span><strong class="mono" id="remainingPreview" style="color:var(--danger);">—</strong>
      </div>
    </div>

    <div class="modal-actions">
      <button type="button" class="btn btn-outline" id="cancelCreateModal"><span data-i18n="common.cancel">Huỷ</span></button>
      <button type="button" class="btn btn-accent" id="btnSubmitInvoice">Tạo</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="collectModal">
  <div class="modal-box">
    <button class="modal-close" id="closeCollectModal">✕</button>
    <h3>Thu tiền</h3>
    <p class="modal-sub" id="collectInfo"></p>
    <div class="form-error" id="collectError"></div>

    <div id="walletCollectBox" style="display:none; margin-bottom:16px; padding-bottom:16px; border-bottom:1px solid var(--border);">
      <div class="cell-muted" style="margin-bottom:8px;">Số dư ví: <strong id="walletBalanceDisplay"></strong></div>
      <div class="field"><label for="collectCoin">Số AIScoins cần trừ</label><input type="number" id="collectCoin" min="0" /></div>
      <button class="btn btn-accent" id="btnCollectWallet" style="width:100%;">💳 Thu qua Ví</button>
    </div>

    <div>
      <div class="field"><label for="collectVndCounter">Số tiền thu tại quầy (VNĐ)</label><input type="number" id="collectVndCounter" min="0" /></div>
      <div class="field"><label for="collectMethod">Hình thức</label>
        <select id="collectMethod"><option value="CASH">Tiền mặt</option><option value="BANK_TRANSFER">Chuyển khoản</option></select>
      </div>
      <button class="btn btn-outline" id="btnCollectCounter" style="width:100%;">🧾 Thu tại quầy</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/edu/wallet-invoices.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
