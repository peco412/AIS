<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Phân lịch tuần giáo viên — ERP AIS</title>
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ERP AIS" />
<link rel="apple-touch-icon" href="/assets/icon-192.png" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
</head>
<body data-page="/edu/teacher-schedule.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>ERP AIS<small data-i18n="brand.subtitle">Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 ERP AIS</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <div class="search-box"><span>🔎</span><input type="text" id="searchInput" placeholder="Tìm tên giáo viên..." /></div>
    </div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'">🔔<span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn">⎋</button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1>Phân lịch tuần giáo viên</h1><div class="sub">Xếp lịch dạy theo tuần, có thể phân dạy thay khi giáo viên chính vắng.</div></div>
      <button class="btn btn-accent" id="btnAdd">+ Thêm buổi dạy</button>
    </div>

    <div class="toolbar">
      <div class="toolbar__filters">
        <select class="select-input" id="filterCenterHQ" style="display:none;"></select>
        <input class="text-input" type="date" id="filterWeek" title="Chọn 1 ngày bất kỳ trong tuần cần xem" />
      </div>
      <div class="cell-muted" id="resultCount"></div>
    </div>

    <div class="data-table-wrap">
      <table class="data-table">
        <thead><tr><th>Thứ</th><th>Giờ</th><th>Lớp</th><th>Giáo viên</th><th>Dạy thay cho</th><th></th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="6" class="empty-cell">Đang tải dữ liệu...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<div class="modal-overlay" id="schedModal">
  <div class="modal-box">
    <button class="modal-close" id="closeModal">✕</button>
    <h3 id="modalTitle">Thêm buổi dạy</h3>
    <div class="form-error" id="formError"></div>
    <form id="schedForm">
      <input type="hidden" id="schedId" />
      <div class="field"><label for="classSelect">Lớp *</label><select id="classSelect" required></select></div>
      <div class="field"><label for="teacherSelect">Giáo viên đứng lớp *</label><select id="teacherSelect" required></select></div>
      <div class="field-grid-2">
        <div class="field"><label for="weekStart">Tuần bắt đầu (thứ 2) *</label><input type="date" id="weekStart" required /></div>
        <div class="field"><label for="dayOfWeek">Thứ *</label>
          <select id="dayOfWeek" required>
            <option value="1">Thứ 2</option><option value="2">Thứ 3</option><option value="3">Thứ 4</option>
            <option value="4">Thứ 5</option><option value="5">Thứ 6</option><option value="6">Thứ 7</option><option value="7">Chủ nhật</option>
          </select>
        </div>
      </div>
      <div class="field-grid-2">
        <div class="field"><label for="startTime">Giờ bắt đầu</label><input type="time" id="startTime" /></div>
        <div class="field"><label for="endTime">Giờ kết thúc</label><input type="time" id="endTime" /></div>
      </div>
      <div class="field">
        <label><input type="checkbox" id="isSubstitute" /> Đây là buổi dạy thay</label>
      </div>
      <div class="field" id="substituteForField" style="display:none;">
        <label for="substituteFor">Dạy thay cho giáo viên</label><select id="substituteFor"></select>
      </div>
      <div class="field"><label for="note">Ghi chú</label><textarea id="note" rows="2"></textarea></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" id="deleteSched" style="margin-right:auto; display:none;">Xoá</button>
        <button type="button" class="btn btn-outline" id="cancelModal"><span data-i18n="common.cancel">Huỷ</span></button>
        <button type="submit" class="btn btn-accent" id="submitSched"><span data-i18n="common.save">Lưu</span></button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/edu/teacher-schedule.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
