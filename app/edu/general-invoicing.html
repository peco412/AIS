<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tạo hoá đơn chung — AIS OFFICE</title>
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="AIS OFFICE" />
<link rel="apple-touch-icon" href="/assets/icon-192.png" />
<meta name="theme-color" content="#0094D9" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
<style>
  .plan-tag { display: inline-flex; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; }
  .plan-tag--monthly { background: var(--warning-tint); color: var(--warning); }
  .plan-tag--single_course { background: var(--accent-tint); color: var(--accent-deep); }
  .plan-tag--sublevel { background: var(--success-tint); color: var(--success); }
  .plan-tag--none { background: var(--surface-sunken); color: var(--muted); }
</style>
</head>
<body data-page="/edu/general-invoicing.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>AIS OFFICE<small data-i18n="brand.subtitle">Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 AIS OFFICE</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left"><button class="menu-toggle" id="menuToggle"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg></button></div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'"><svg class="icon" viewBox="0 0 24 24"><path d="M6 8a6 6 0 1 1 12 0c0 4 1.5 6 2 6.5H4c.5-.5 2-2.5 2-6.5z"/><path d="M9.5 18a2.5 2.5 0 0 0 5 0"/></svg><span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn"><svg class="icon" viewBox="0 0 24 24"><path d="M9 4H5a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h4"/><path d="M15 16l4-4-4-4"/><path d="M19 12H9"/></svg></button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1>Tạo hoá đơn chung</h1><div class="sub">Học sinh đã xếp lớp nhưng CHƯA có hoá đơn tháng này — chọn 1 trong 4 hình thức đóng học phí ngay khi tạo, không cần chốt trước.</div></div>
    </div>

    <div class="toolbar">
      <input type="text" class="text-input" id="searchBox" placeholder="Tìm theo tên học sinh hoặc SĐT phụ huynh..." style="min-width:320px;" />
      <div class="cell-muted" id="resultCount"></div>
    </div>

    <div class="data-table-wrap">
      <table class="data-table">
        <thead><tr><th>Học sinh</th><th>Lớp</th><th>Trung tâm</th><th>Tư vấn viên</th><th>Ngày bắt đầu</th><th></th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="6" class="empty-cell">Đang tải dữ liệu...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<div class="modal-overlay" id="createModal">
  <div class="modal-box">
    <button class="modal-close" id="closeCreateModal"><svg class="icon icon--sm" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    <h3>Tạo hoá đơn — <span id="modalStudentName"></span></h3>
    <p class="cell-muted" id="modalPlanInfo" style="font-size:13px;"></p>
    <div class="form-error" id="createError"></div>

    <div class="field"><label for="paymentOption">Hình thức đóng học phí *</label>
      <select id="paymentOption">
        <option value="">— Chọn hình thức —</option>
        <option value="BY_MONTH">Theo tháng</option>
        <option value="BY_COURSE">Theo khoá hiện tại</option>
        <option value="COMBO_2_COURSES">Đóng 2 khoá liền</option>
        <option value="FULL_SUB_LEVEL">Trọn cấp độ con</option>
      </select>
    </div>
    <div class="field"><label>Học phí gốc (xem trước)</label><div class="cell-muted mono" id="pricePreview" style="padding:6px 0; font-size:15px; font-weight:700; color:var(--ink);">—</div></div>

    <div class="field-grid-2">
      <div class="field"><label for="manualDiscountRate">Ưu đãi tay (%)</label><input type="number" id="manualDiscountRate" min="0" max="100" step="0.5" value="0" /></div>
      <div class="field"><label for="specialCategory">Diện ưu đãi đặc biệt</label>
        <select id="specialCategory">
          <option value="">— Không —</option>
          <option value="board_child">Con HĐQT</option>
          <option value="board_grandchild">Cháu HĐQT</option>
          <option value="principal_child">Con Hiệu trưởng</option>
          <option value="other">Khác</option>
        </select>
      </div>
    </div>

    <div class="modal-actions">
      <button type="button" class="btn btn-outline" id="cancelCreateModal">Huỷ</button>
      <button type="button" class="btn btn-accent" id="submitCreate">Tạo hoá đơn</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/edu/general-invoicing.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
