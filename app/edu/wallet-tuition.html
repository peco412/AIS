<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Thu học phí qua Ví — ERP AIS</title>
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ERP AIS" />
<link rel="apple-touch-icon" href="/assets/icon-192.png" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
</head>
<body data-page="/edu/wallet-tuition.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>ERP AIS<small data-i18n="brand.subtitle">Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 ERP AIS</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left"><button class="menu-toggle" id="menuToggle">☰</button></div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'">🔔<span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn">⎋</button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1>Thu học phí qua Ví</h1><div class="sub">Trừ AIScoins theo FIFO cho hoá đơn — khác luồng thu tiền mặt/chuyển khoản tại quầy (trang "Thu học phí" cũ).</div></div>
    </div>

    <div class="toolbar">
      <input class="text-input" type="text" id="searchInput" placeholder="Tìm học viên theo tên hoặc SĐT phụ huynh..." style="min-width:340px;" />
    </div>

    <div id="searchResults"></div>
  </main>
</div>

<div class="modal-overlay" id="deductModal">
  <div class="modal-box">
    <button class="modal-close" id="closeModal">✕</button>
    <h3>Thu qua Ví</h3>
    <div class="modal-sub" id="invoiceInfo"></div>
    <div class="form-error" id="formError"></div>
    <div class="field"><label for="coinAmount">Số AIScoins trừ *</label><input type="number" id="coinAmount" min="1" /></div>
    <div class="modal-actions">
      <button type="button" class="btn btn-outline" id="cancelModal"><span data-i18n="common.cancel">Huỷ</span></button>
      <button type="button" class="btn btn-accent" id="btnConfirmDeduct">Xác nhận trừ ví</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/edu/wallet-tuition.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
