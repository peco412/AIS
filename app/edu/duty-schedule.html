<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Phân lịch trực trung tâm — AIS OFFICE</title>
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="AIS OFFICE" />
<link rel="apple-touch-icon" href="/assets/icon-192.png" />
<meta name="theme-color" content="#0094D9" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
</head>
<body data-page="/edu/duty-schedule.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>AIS OFFICE<small data-i18n="brand.subtitle">Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 AIS OFFICE</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left">
      <button class="menu-toggle" id="menuToggle"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg></button>
      </div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'"><svg class="icon" viewBox="0 0 24 24"><path d="M6 8a6 6 0 1 1 12 0c0 4 1.5 6 2 6.5H4c.5-.5 2-2.5 2-6.5z"/><path d="M9.5 18a2.5 2.5 0 0 0 5 0"/></svg><span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn"><svg class="icon" viewBox="0 0 24 24"><path d="M9 4H5a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h4"/><path d="M15 16l4-4-4-4"/><path d="M19 12H9"/></svg></button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1>Phân lịch trực trung tâm</h1><div class="sub">Quản lý trung tâm xếp lịch trực theo tuần; Nhân sự/Truyền thông/BĐH xem để tổng hợp.</div></div>
    </div>

    <div class="toolbar">
      <div class="toolbar__filters">
        <select class="select-input" id="filterCenter"></select>
      </div>
      <div class="cell-muted" id="resultCount"></div>
    </div>

    <div class="week-nav">
      <button class="btn btn-outline btn-sm" id="btnPrevWeek">‹ Tuần trước</button>
      <div class="week-label" id="weekLabel"></div>
      <button class="btn btn-outline btn-sm" id="btnNextWeek">Tuần sau ›</button>
      <input class="text-input" type="date" id="weekPicker" style="margin-left:auto;" />
    </div>

    <div class="week-grid-wrap">
      <table class="week-grid">
        <thead><tr id="weekGridHead"></tr></thead>
        <tbody id="weekGridBody"><tr><td class="empty-cell">Đang tải dữ liệu...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<div class="modal-overlay" id="dutyModal">
  <div class="modal-box">
    <button class="modal-close" id="closeModal"><svg class="icon icon--sm" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    <h3 id="modalTitle">Lịch trực</h3>
    <div class="form-error" id="formError"></div>
    <form id="dutyForm">
      <input type="hidden" id="dutyId" />
      <div class="field"><label for="employeeSelect">Nhân viên trực *</label><select id="employeeSelect" required></select></div>
      <div class="field-grid-2">
        <div class="field"><label for="dutyDate">Ngày trực *</label><input type="date" id="dutyDate" required /></div>
        <div class="field"><label for="shift">Ca trực</label><input type="text" id="shift" placeholder="Sáng / Chiều / Tối" /></div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" id="deleteDuty" style="margin-right:auto; display:none;">Xoá</button>
        <button type="button" class="btn btn-outline" id="cancelModal"><span data-i18n="common.cancel">Huỷ</span></button>
        <button type="submit" class="btn btn-accent" id="submitDuty"><span data-i18n="common.save">Lưu</span></button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/edu/duty-schedule.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
