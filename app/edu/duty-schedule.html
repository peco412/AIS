<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Phân lịch trực trung tâm — ERP AIS</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
</head>
<body data-page="/edu/duty-schedule.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>ERP AIS<small>Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 ERP AIS</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <div class="search-box"><span>🔎</span><input type="text" id="searchInput" placeholder="Tìm tên nhân viên trực..." /></div>
    </div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'">🔔<span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn">⎋</button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1>Phân lịch trực trung tâm</h1><div class="sub">Quản lý trung tâm xếp lịch trực theo tuần; Nhân sự/Truyền thông/BĐH xem để tổng hợp.</div></div>
    </div>

    <div class="toolbar">
      <div class="toolbar__filters">
        <select class="select-input" id="filterCenter"></select>
      </div>
      <div class="cell-muted" id="resultCount"></div>
    </div>

    <div class="week-nav">
      <button class="btn btn-outline btn-sm" id="btnPrevWeek">‹ Tuần trước</button>
      <div class="week-label" id="weekLabel"></div>
      <button class="btn btn-outline btn-sm" id="btnNextWeek">Tuần sau ›</button>
      <input class="text-input" type="date" id="weekPicker" style="margin-left:auto;" />
    </div>

    <div class="week-grid-wrap">
      <table class="week-grid">
        <thead><tr id="weekGridHead"></tr></thead>
        <tbody id="weekGridBody"><tr><td class="empty-cell">Đang tải dữ liệu...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<div class="modal-overlay" id="dutyModal">
  <div class="modal-box">
    <button class="modal-close" id="closeModal">✕</button>
    <h3 id="modalTitle">Lịch trực</h3>
    <div class="form-error" id="formError"></div>
    <form id="dutyForm">
      <input type="hidden" id="dutyId" />
      <div class="field"><label for="employeeSelect">Nhân viên trực *</label><select id="employeeSelect" required></select></div>
      <div class="field-grid-2">
        <div class="field"><label for="dutyDate">Ngày trực *</label><input type="date" id="dutyDate" required /></div>
        <div class="field"><label for="shift">Ca trực</label><input type="text" id="shift" placeholder="Sáng / Chiều / Tối" /></div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" id="deleteDuty" style="margin-right:auto; display:none;">Xoá</button>
        <button type="button" class="btn btn-outline" id="cancelModal">Huỷ</button>
        <button type="submit" class="btn btn-accent" id="submitDuty">Lưu</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/edu/duty-schedule.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
