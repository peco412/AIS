<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Phiếu bán lẻ — AIS OFFICE</title>
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="AIS OFFICE" />
<link rel="apple-touch-icon" href="/assets/icon-192.png" />
<meta name="theme-color" content="#0094D9" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
<style>
  .retail-item-row { border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 12px; }
  .retail-item-row__grid { display: grid; grid-template-columns: 2fr 1fr 0.8fr 0.8fr auto; gap: 10px; align-items: end; }
  .retail-item-row .field label { font-size: 10.5px; color: var(--muted); margin-bottom: 3px; display: block; }
  @media (max-width: 720px) { .retail-item-row__grid { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body data-page="/edu/retail-sale.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>AIS OFFICE<small data-i18n="brand.subtitle">Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 AIS OFFICE</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left"><button class="menu-toggle" id="menuToggle"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg></button></div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'"><svg class="icon" viewBox="0 0 24 24"><path d="M6 8a6 6 0 1 1 12 0c0 4 1.5 6 2 6.5H4c.5-.5 2-2.5 2-6.5z"/><path d="M9.5 18a2.5 2.5 0 0 0 5 0"/></svg><span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn"><svg class="icon" viewBox="0 0 24 24"><path d="M9 4H5a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h4"/><path d="M15 16l4-4-4-4"/><path d="M19 12H9"/></svg></button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1>Phiếu bán lẻ tại quầy</h1><div class="sub">Bán sách/đồng phục/quà tặng lẻ — tự trừ kho và ghi nhận doanh thu ngay khi hoàn thành.</div></div>
      <select class="select-input" id="filterCenter" style="display:none;"></select>
    </div>

    <div class="card" style="max-width:680px;">
      <div class="form-error" id="retailFormError"></div>

      <div class="field"><label for="retailStudentSearch">Tìm học viên (để trống nếu khách vãng lai)</label><input type="text" class="text-input" id="retailStudentSearch" placeholder="Nhập tên..." style="width:100%;" /></div>
      <div id="retailStudentResult" class="cell-muted" style="margin-bottom:10px;"></div>
      <div class="field-grid-2">
        <div class="field"><label for="retailCustomerName">Tên khách hàng *</label><input type="text" id="retailCustomerName" required /></div>
        <div class="field"><label for="retailPhone">Số điện thoại</label><input type="tel" id="retailPhone" /></div>
      </div>
      <div class="field-grid-2">
        <div class="field"><label for="retailMethod">Hình thức thu *</label><select id="retailMethod"><option value="CASH">Tiền mặt</option><option value="BANK_TRANSFER">Chuyển khoản</option></select></div>
        <div class="field"><label for="retailReason">Lý do</label><input type="text" id="retailReason" placeholder="Bán sách/quà tặng..." /></div>
      </div>

      <h4 style="margin:18px 0 10px; font-size:13.5px;">Chi tiết đơn hàng</h4>
      <div id="retailItemsList"></div>
      <button type="button" class="btn btn-outline btn-sm" id="btnAddRetailItem" style="margin-bottom:16px;">+ Thêm dòng</button>

      <p style="text-align:right; font-weight:700; font-size:16px; border-top:1px dashed var(--border); padding-top:12px;">Tổng cộng: <span id="retailTotalPreview">0 đ</span></p>

      <div class="modal-actions">
        <button type="button" class="btn btn-outline" onclick="location.href='/edu/inventory.html'">Huỷ</button>
        <button type="button" class="btn btn-accent" id="btnSubmitRetail">Hoàn thành & Xuất kho</button>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/edu/retail-sale.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
