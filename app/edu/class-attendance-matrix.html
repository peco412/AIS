<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bảng điểm danh lớp — ERP AIS</title>
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ERP AIS" />
<link rel="apple-touch-icon" href="/assets/icon-192.png" />
<meta name="theme-color" content="#0094D9" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
<style>
  /* Bảng điểm danh dạng lưới — cột ngày kéo ngang, cột tên học viên cố định
     bên trái (sticky) để cuộn ngang dài vẫn luôn thấy tên. */
  .attendance-matrix-wrap {
    background: var(--surface-card); border: 1px solid var(--border); border-radius: var(--radius-md);
    overflow-x: auto; box-shadow: var(--shadow-xs); -webkit-overflow-scrolling: touch;
  }
  table.attendance-matrix { border-collapse: collapse; font-size: 12.5px; }
  .attendance-matrix th, .attendance-matrix td { border-bottom: 1px solid var(--separator); padding: 8px 10px; text-align: center; white-space: nowrap; }
  .attendance-matrix thead th { background: var(--surface-sunken); font-weight: 700; font-size: 10.5px; text-transform: uppercase; color: var(--ink-soft); }
  .attendance-matrix .name-col {
    position: sticky; left: 0; z-index: 2; background: var(--surface-card);
    text-align: left; font-weight: 600; min-width: 150px; box-shadow: 2px 0 4px rgba(0,0,0,0.04);
  }
  .attendance-matrix thead .name-col { background: var(--surface-sunken); z-index: 3; }
  .att-mark { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 8px; font-weight: 700; font-size: 11px; }
  .att-mark.present { background: var(--success-tint); color: var(--success); }
  .att-mark.excused { background: var(--warning-tint); color: var(--warning); }
  .att-mark.unexcused { background: var(--danger-tint); color: var(--danger); }
  .att-mark.none { color: var(--border-strong); }
  .att-legend { display: flex; gap: 16px; margin-bottom: 14px; font-size: 12px; color: var(--ink-soft); }
  .att-legend span { display: inline-flex; align-items: center; gap: 5px; }
</style>
</head>
<body data-page="/edu/class-attendance-matrix.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>ERP AIS<small data-i18n="brand.subtitle">Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 ERP AIS</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left"><button class="menu-toggle" id="menuToggle"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg></button></div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'"><svg class="icon" viewBox="0 0 24 24"><path d="M6 8a6 6 0 1 1 12 0c0 4 1.5 6 2 6.5H4c.5-.5 2-2.5 2-6.5z"/><path d="M9.5 18a2.5 2.5 0 0 0 5 0"/></svg><span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn"><svg class="icon" viewBox="0 0 24 24"><path d="M9 4H5a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h4"/><path d="M15 16l4-4-4-4"/><path d="M19 12H9"/></svg></button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1 id="className">Bảng điểm danh</h1><div class="sub">Kéo ngang để xem hết các buổi học từ đầu khoá đến hiện tại.</div></div>
    </div>

    <div class="att-legend">
      <span><span class="att-mark present">O</span> Có mặt</span>
      <span><span class="att-mark excused">P</span> Vắng có phép</span>
      <span><span class="att-mark unexcused">KP</span> Vắng không phép</span>
      <span><span class="att-mark none">–</span> Chưa điểm danh</span>
    </div>

    <div class="attendance-matrix-wrap">
      <table class="attendance-matrix" id="matrixTable">
        <thead><tr id="matrixHead"><th class="name-col">Danh sách học viên</th></tr></thead>
        <tbody id="matrixBody"><tr><td class="empty-cell">Đang tải dữ liệu...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

</html>
