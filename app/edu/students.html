<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Danh sách học viên — ERP AIS</title>
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ERP AIS" />
<link rel="apple-touch-icon" href="/assets/icon-192.png" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
</head>
<body data-page="/edu/students.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>ERP AIS<small data-i18n="brand.subtitle">Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 ERP AIS</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <div class="search-box"><span>🔎</span><input type="text" id="searchInput" placeholder="Tìm tên học viên, phụ huynh..." /></div>
    </div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'">🔔<span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn">⎋</button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1>Danh sách học viên</h1><div class="sub" id="centerHint">Trung tâm: —</div></div>
      <button class="btn btn-accent" id="btnAdd">+ Thêm học viên</button>
    </div>

    <div class="toolbar">
      <div class="toolbar__filters">
        <select class="select-input" id="filterClass"><option value="">Tất cả các lớp</option></select>
        <select class="select-input" id="filterStatus">
          <option value="">Tất cả trạng thái</option>
          <option value="trial">Học thử</option>
          <option value="studying">Đang học</option>
          <option value="reserved">Bảo lưu</option>
          <option value="withdrawn">Đã nghỉ</option>
        </select>
      </div>
      <div class="cell-muted" id="resultCount"></div>
    </div>

    <div class="data-table-wrap">
      <table class="data-table">
        <thead><tr><th>Học viên</th><th>Ngày sinh</th><th>Lớp</th><th>Phụ huynh</th><th>SĐT</th><th data-i18n="common.status">Trạng thái</th><th></th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="7" class="empty-cell">Đang tải dữ liệu...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<div class="modal-overlay" id="studentModal">
  <div class="modal-box">
    <button class="modal-close" id="closeModal">✕</button>
    <h3 id="modalTitle">Thêm học viên</h3>
    <div class="form-error" id="formError"></div>
    <form id="studentForm">
      <input type="hidden" id="studentId" />
      <div class="field-grid-2">
        <div class="field"><label for="fullName">Họ và tên học viên *</label><input type="text" id="fullName" required /></div>
        <div class="field"><label for="dob">Ngày sinh</label><input type="date" id="dob" /></div>
      </div>
      <div class="field"><label for="currentSchool">Trường đang học</label><input type="text" id="currentSchool" /></div>
      <div class="field-grid-2">
        <div class="field"><label for="entryLevel">Trình độ đầu vào (khi test)</label><select id="entryLevel"><option value="">—</option></select></div>
        <div class="field"><label for="classSelect">Lớp học</label><select id="classSelect"><option value="">— Chưa phân lớp —</option></select></div>
      </div>
      <div class="field-grid-2">
        <div class="field"><label for="parentName">Tên phụ huynh</label><input type="text" id="parentName" /></div>
        <div class="field"><label for="email">Email</label><input type="email" id="email" /></div>
      </div>
      <div class="field-grid-2">
        <div class="field"><label for="phone">SĐT liên lạc</label><input type="text" id="phone" /></div>
        <div class="field"><label for="backupPhone">SĐT dự phòng</label><input type="text" id="backupPhone" /></div>
      </div>
      <div class="field-grid-2">
        <div class="field"><label for="enrollmentDate">Ngày nhập học</label><input type="date" id="enrollmentDate" /></div>
        <div class="field">
          <label for="status">Trạng thái</label>
          <select id="status"><option value="trial">Học thử</option><option value="studying">Đang học</option><option value="reserved">Bảo lưu</option><option value="withdrawn">Đã nghỉ</option></select>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" id="cancelModal"><span data-i18n="common.cancel">Huỷ</span></button>
        <button type="submit" class="btn btn-accent" id="submitStudent"><span data-i18n="common.save">Lưu</span></button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/edu/students.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
