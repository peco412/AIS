<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bảng giá chương trình học — ERP AIS</title>
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ERP AIS" />
<link rel="apple-touch-icon" href="/assets/icon-192.png" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
</head>
<body data-page="/edu/program-pricing.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>ERP AIS<small data-i18n="brand.subtitle">Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 ERP AIS</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left"><button class="menu-toggle" id="menuToggle">☰</button></div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'">🔔<span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn">⎋</button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1>Bảng giá chương trình học</h1><div class="sub">Bấm vào từng chương trình để xem chi tiết — học phí gốc từng khoá, tự cộng dồn ra giá trọn cấp độ con/cấp độ/chương trình.</div></div>
    </div>

    <div id="programGroups"><div class="empty-cell">Đang tải dữ liệu...</div></div>
  </main>
</div>

<style>
  .program-group { background: var(--surface-card); border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 12px; overflow: hidden; }
  .program-group summary { list-style: none; cursor: pointer; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
  .program-group summary::-webkit-details-marker { display: none; }
  .program-group summary .name { font-weight: 700; font-size: 14.5px; }
  .program-group summary .total { font-family: var(--font-mono); color: var(--accent-deep); font-weight: 700; }
  .program-group[open] summary { border-bottom: 1px solid var(--border); }
  .level-block { padding: 14px 20px; border-bottom: 1px solid var(--separator); }
  .level-block:last-child { border-bottom: none; }
  .level-block__title { font-size: 12.5px; font-weight: 700; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 8px; }
  .sublevel-row { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0 6px 12px; font-size: 13px; border-left: 2px solid var(--border); margin-bottom: 4px; }
  .sublevel-row__name { color: var(--ink-soft); }
  .course-list { display: flex; flex-wrap: wrap; gap: 6px 14px; padding-left: 12px; margin-top: 2px; margin-bottom: 8px; }
  .course-chip { font-size: 11.5px; color: var(--muted); }
  .course-chip input { width: 100px; font-size: 11.5px; padding: 3px 6px; }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/edu/program-pricing.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
