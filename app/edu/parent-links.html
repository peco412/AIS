<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Liên kết Phụ huynh — Học sinh — ERP AIS</title>
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ERP AIS" />
<link rel="apple-touch-icon" href="/assets/icon-192.png" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
</head>
<body data-page="/edu/parent-links.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>ERP AIS<small data-i18n="brand.subtitle">Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 ERP AIS</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left"><button class="menu-toggle" id="menuToggle">☰</button></div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'">🔔<span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn">⎋</button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1>Liên kết Phụ huynh — Học sinh</h1><div class="sub">Tìm học sinh, liên kết với tài khoản phụ huynh (App AIS Center) để phụ huynh xem được ví/công nợ.</div></div>
    </div>

    <div class="toolbar">
      <div class="toolbar__filters">
        <input class="text-input" type="text" id="searchStudent" placeholder="Tìm học sinh theo tên hoặc SĐT phụ huynh cũ..." style="min-width:320px;" />
      </div>
    </div>

    <div class="data-table-wrap">
      <table class="data-table">
        <thead><tr><th>Học sinh</th><th>Trung tâm</th><th>Phụ huynh đã liên kết</th><th></th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="4" class="empty-cell">Nhập tên học sinh để tìm kiếm...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<div class="modal-overlay" id="linkModal">
  <div class="modal-box">
    <button class="modal-close" id="closeModal">✕</button>
    <h3>Liên kết phụ huynh</h3>
    <p class="modal-sub" id="linkStudentInfo"></p>
    <div class="form-error" id="formError"></div>

    <div class="field"><label for="parentPhone">Số điện thoại phụ huynh *</label><input type="tel" id="parentPhone" placeholder="09xxxxxxxx" required /></div>
    <div id="foundParentBox" style="display:none; background:var(--accent-tint); border-radius:10px; padding:10px 12px; margin-bottom:14px; font-size:13px;"></div>
    <div id="newParentFields" style="display:none;">
      <div class="field"><label for="parentName">Họ tên phụ huynh *</label><input type="text" id="parentName" /></div>
    </div>
    <div class="field"><label for="relationship">Mối quan hệ</label>
      <select id="relationship">
        <option value="Bố">Bố</option>
        <option value="Mẹ">Mẹ</option>
        <option value="Người giám hộ">Người giám hộ</option>
      </select>
    </div>

    <div class="modal-actions">
      <button type="button" class="btn btn-outline" id="cancelModal"><span data-i18n="common.cancel">Huỷ</span></button>
      <button type="button" class="btn btn-accent" id="btnSearchParent">Tìm / Kiểm tra SĐT</button>
      <button type="button" class="btn btn-accent" id="btnConfirmLink" style="display:none;">Xác nhận liên kết</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/edu/parent-links.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
