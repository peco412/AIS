<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hồ sơ khách hàng — AIS OFFICE</title>
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="AIS OFFICE" />
<link rel="apple-touch-icon" href="/assets/icon-192.png" />
<meta name="theme-color" content="#0094D9" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
</head>
<body data-page="/consultant/leads.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>AIS OFFICE<small data-i18n="brand.subtitle">Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 AIS OFFICE</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left">
      <button class="menu-toggle" id="menuToggle"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg></button>
      <div class="search-box"><svg class="icon icon--sm" viewBox="0 0 24 24"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M20 20l-4.8-4.8"/></svg><input type="text" id="searchInput" placeholder="Tìm tên học viên, phụ huynh..." /></div>
    </div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'"><svg class="icon" viewBox="0 0 24 24"><path d="M6 8a6 6 0 1 1 12 0c0 4 1.5 6 2 6.5H4c.5-.5 2-2.5 2-6.5z"/><path d="M9.5 18a2.5 2.5 0 0 0 5 0"/></svg><span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn"><svg class="icon" viewBox="0 0 24 24"><path d="M9 4H5a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h4"/><path d="M15 16l4-4-4-4"/><path d="M19 12H9"/></svg></button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1>Hồ sơ khách hàng</h1><div class="sub">Quản lý khách hàng tiềm năng và theo dõi kết quả tư vấn.</div></div>
      <button class="btn btn-accent" id="btnAdd">+ Thêm hồ sơ</button>
    </div>

    <div class="stat-grid" id="statCards"></div>

    <div class="toolbar">
      <select class="select-input" id="filterStatus">
        <option value="">Tất cả trạng thái</option>
        <option value="potential">Tiềm năng</option>
        <option value="success">Thành công</option>
        <option value="rejected">Từ chối</option>
      </select>
      <div class="cell-muted" id="resultCount"></div>
    </div>

    <div class="data-table-wrap">
      <table class="data-table">
        <thead><tr><th>Mã</th><th>Học viên</th><th>Ngày sinh</th><th>Phụ huynh</th><th>SĐT</th><th data-i18n="common.status">Trạng thái</th><th></th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="7" class="empty-cell">Đang tải dữ liệu...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<div class="modal-overlay" id="leadModal">
  <div class="modal-box">
    <button class="modal-close" id="closeModal"><svg class="icon icon--sm" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    <h3 id="modalTitle">Thêm hồ sơ khách hàng</h3>
    <div class="form-error" id="formError"></div>
    <form id="leadForm">
      <input type="hidden" id="leadId" />
      <div class="field-grid-2">
        <div class="field"><label for="fullName">Họ và tên học viên *</label><input type="text" id="fullName" required /></div>
        <div class="field"><label for="dob">Ngày sinh</label><input type="date" id="dob" /></div>
      </div>
      <div class="field"><label for="currentSchool">Trường đang học</label><input type="text" id="currentSchool" /></div>
      <div class="field-grid-2">
        <div class="field"><label for="parentName">Tên phụ huynh</label><input type="text" id="parentName" /></div>
        <div class="field"><label for="email">Email</label><input type="email" id="email" /></div>
      </div>
      <div class="field-grid-2">
        <div class="field"><label for="phone">SĐT liên lạc</label><input type="text" id="phone" /></div>
        <div class="field"><label for="backupPhone">SĐT dự phòng</label><input type="text" id="backupPhone" /></div>
      </div>
      <div class="field">
        <label for="status">Trạng thái</label>
        <select id="status"><option value="potential">Tiềm năng</option><option value="success">Thành công</option><option value="rejected">Từ chối</option></select>
      </div>
      <div class="field"><label for="note">Ghi chú</label><textarea id="note" rows="2"></textarea></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" id="cancelModal"><span data-i18n="common.cancel">Huỷ</span></button>
        <button type="submit" class="btn btn-accent" id="submitLead"><span data-i18n="common.save">Lưu</span></button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/consultant/leads.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
