<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Room — Cá nhân — AIS OFFICE</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#241c30" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: linear-gradient(180deg, #2a2036 0%, #3a2c3e 40%, #5a3e42 75%, #8a5a4a 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    min-height: 100vh; padding: 40px 16px 28px;
  }
  .room-header { text-align: center; margin-bottom: 20px; opacity: 0; animation: fu 0.6s var(--ease-spring) forwards; }
  .room-eyebrow { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.2em; text-transform: uppercase; color: #e3a97a; margin-bottom: 8px; }
  .room-title { font-family: 'Playfair Display', serif; font-size: 27px; font-weight: 700; color: #fbf3e4; }
  .room-sub { font-size: 12.5px; color: #d8c9c2; margin-top: 6px; }

  .room-window {
    width: 100%; max-width: 320px; height: 110px; margin: 0 auto 24px; border-radius: 14px;
    background: linear-gradient(180deg, #f0bf7d 0%, #d69a5e 60%, #8a5a52 100%);
    border: 8px solid #3a2e28; box-shadow: 0 12px 30px rgba(0,0,0,0.35), inset 0 0 0 2px rgba(0,0,0,0.2);
    position: relative; opacity: 0; animation: fu 0.7s var(--ease-spring) 0.1s forwards;
  }
  .room-window::before, .room-window::after { content:''; position:absolute; background:#3a2e28; }
  .room-window::before { left:50%; top:0; bottom:0; width:6px; transform:translateX(-50%); }
  .room-window::after { top:50%; left:0; right:0; height:6px; transform:translateY(-50%); }

  .room-grid {
    width: 100%; max-width: 620px; display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px;
    opacity: 0; animation: fu 0.7s var(--ease-spring) 0.18s forwards;
  }
  .room-item {
    background: rgba(20,15,22,0.55); backdrop-filter: blur(8px); border: 1px solid rgba(227,169,122,0.22);
    border-radius: 16px; padding: 18px 14px; text-align: center; cursor: pointer;
    transition: transform 0.2s var(--ease-spring), border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
  }
  .room-item:hover { transform: translateY(-4px); border-color: rgba(227,169,122,0.5); box-shadow: 0 14px 26px rgba(0,0,0,0.3); }
  .room-item--locked { cursor: not-allowed; opacity: 0.4; }
  .room-item--locked:hover { transform: none; box-shadow: none; }
  .room-item__icon { font-size: 26px; margin-bottom: 8px; }
  .room-item__name { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 600; font-size: 13px; color: #fbf3e4; }

  .room-back { margin-top: 24px; background: none; border: none; color: #e0cfc5; font-size: 12.5px; cursor: pointer; text-decoration: underline; opacity: 0; animation: fu 0.6s var(--ease-spring) 0.3s forwards; }

  @keyframes fu { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; opacity: 1 !important; } }
</style>
</head>
<body>

<div class="room-header">
  <div class="room-eyebrow">ROOM — CÁ NHÂN</div>
  <div class="room-title">Không gian của bạn</div>
  <div class="room-sub">Chọn 1 chức năng để bắt đầu</div>
</div>

<div class="room-window"></div>

<div class="room-grid" id="roomGrid"></div>

<button class="room-back" id="btnBack">← Về màn chọn thế giới</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/js/roomLobby.js"></script>
</body>
</html>
