<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Báo cáo tài chính — ERP AIS</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
</head>
<body data-page="/acc/reports.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>ERP AIS<small>Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 ERP AIS</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <div class="search-box"><span>🔎</span><input type="text" placeholder="Tìm kiếm..." /></div>
    </div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'">🔔<span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn">⎋</button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1>Báo cáo tài chính</h1><div class="sub">Dòng tiền 6 tháng gần nhất và công nợ hiện tại.</div></div>
      <button class="btn btn-accent" id="btnAddEntry">+ Ghi nhận dòng tiền</button>
    </div>

    <div class="stat-grid" id="statCards"></div>

    <div class="panel" style="margin-bottom:20px;">
      <h3>Dòng tiền theo tháng</h3>
      <canvas id="cashFlowChart" height="90"></canvas>
    </div>

    <div class="panel">
      <h3>Công nợ</h3>
      <div class="data-table-wrap">
        <table class="data-table">
          <thead><tr><th>Đối tác</th><th>Số tiền</th><th>Hạn thanh toán</th><th>Trạng thái</th></tr></thead>
          <tbody id="receivablesBody"><tr><td colspan="4" class="empty-cell">Đang tải dữ liệu...</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="entryModal">
  <div class="modal-box">
    <button class="modal-close" id="closeModal">✕</button>
    <h3>Ghi nhận dòng tiền</h3>
    <div class="form-error" id="formError"></div>
    <div class="field">
      <label for="entryType">Loại *</label>
      <select id="entryType"><option value="inflow">Thu vào</option><option value="outflow">Chi ra</option></select>
    </div>
    <div class="field-grid-2">
      <div class="field"><label for="amount">Số tiền (VNĐ) *</label><input type="number" id="amount" min="0" required /></div>
      <div class="field"><label for="entryDate">Ngày *</label><input type="date" id="entryDate" required /></div>
    </div>
    <div class="field"><label for="category">Danh mục</label><input type="text" id="category" placeholder="VD: Học phí, Thuê mặt bằng..." /></div>
    <div class="field"><label for="note">Ghi chú</label><textarea id="note" rows="2"></textarea></div>
    <div class="modal-actions">
      <button type="button" class="btn btn-outline" id="cancelModal">Huỷ</button>
      <button type="button" class="btn btn-accent" id="submitEntry">Lưu</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/acc/reports.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
