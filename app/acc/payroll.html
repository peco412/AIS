<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bảng lương nhân viên — ERP AIS</title>
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ERP AIS" />
<link rel="apple-touch-icon" href="/assets/icon-192.png" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
<style>
  .data-table input { padding: 6px 8px; border: 1.5px solid var(--border-strong); border-radius: 6px; font-size: 13px; width: 120px; font-family: var(--font-mono); }
  .data-table input:focus { border-color: var(--accent); outline: none; }
</style>
</head>
<body data-page="/acc/payroll.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>ERP AIS<small data-i18n="brand.subtitle">Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 ERP AIS</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <div class="search-box"><span>🔎</span><input type="text" id="searchInput" placeholder="Tìm nhân viên..." /></div>
    </div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'">🔔<span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn">⎋</button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1>Bảng lương nhân viên</h1><div class="sub">Lương thực nhận tự tính = Lương cơ bản + Thưởng - Khấu trừ.</div></div>
      <select class="select-input" id="filterMonth"></select>
    </div>

    <div class="stat-grid" id="statCards"></div>

    <div class="data-table-wrap">
      <table class="data-table">
        <thead><tr><th>Mã NV</th><th>Nhân viên</th><th>Lương cơ bản</th><th>Thưởng</th><th>Khấu trừ</th><th>Thực nhận</th><th></th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="7" class="empty-cell">Đang tải dữ liệu...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/acc/payroll.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
