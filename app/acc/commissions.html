<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hoa hồng tư vấn viên — ERP AIS</title>
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ERP AIS" />
<link rel="apple-touch-icon" href="/assets/icon-192.png" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
</head>
<body data-page="/acc/commissions.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>ERP AIS<small data-i18n="brand.subtitle">Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 ERP AIS</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left"><button class="menu-toggle" id="menuToggle">☰</button></div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'">🔔<span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn">⎋</button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1>Hoa hồng tư vấn viên</h1><div class="sub">Tự động tính % trên hoá đơn đầu tiên của học sinh do tư vấn viên phụ trách, chỉ tính đúng 1 lần cho mỗi học sinh.</div></div>
    </div>

    <div class="panel" style="margin-bottom:20px;" id="rulesPanel">
      <h3>Cấu hình tỷ lệ hoa hồng</h3>
      <div id="rulesList"></div>
      <button class="btn btn-outline btn-sm" id="btnAddRule" style="margin-top:10px;">+ Thêm quy tắc</button>
    </div>

    <div class="toolbar">
      <select class="select-input" id="filterConsultant"></select>
      <select class="select-input" id="filterPeriod"></select>
    </div>

    <div class="data-table-wrap">
      <table class="data-table">
        <thead><tr><th>Tư vấn viên</th><th>Học sinh</th><th>Kỳ</th><th style="text-align:right;">Hoá đơn gốc</th><th style="text-align:right;">Hoa hồng</th><th data-i18n="common.status">Trạng thái</th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="6" class="empty-cell">Đang tải dữ liệu...</td></tr></tbody>
      </table>
    </div>

    <div class="panel" style="margin-top:16px;" id="payoutPanel"></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/acc/commissions.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
