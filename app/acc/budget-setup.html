<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Thiết lập ngân sách — ERP AIS</title>
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ERP AIS" />
<link rel="apple-touch-icon" href="/assets/icon-192.png" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
<style>
  .budget-table { width: 100%; border-collapse: collapse; }
  .budget-table th, .budget-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); text-align: left; font-size: 13px; }
  .budget-table th { font-size: 11px; text-transform: uppercase; color: var(--muted); font-weight: 700; }
  .budget-table input { width: 130px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; font-family: 'IBM Plex Mono', monospace; }
  .cat-parent-row td { background: var(--surface-sunken); font-weight: 700; }
  .progress-bar { width: 100px; height: 6px; background: var(--surface-sunken); border-radius: 999px; overflow: hidden; margin-top: 4px; }
  .progress-bar__fill { height: 100%; border-radius: 999px; transition: width 0.3s; }
</style>
</head>
<body data-page="/acc/budget-setup.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>ERP AIS<small data-i18n="brand.subtitle">Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 ERP AIS</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left"><button class="menu-toggle" id="menuToggle">☰</button></div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'">🔔<span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn">⎋</button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1>Thiết lập ngân sách</h1><div class="sub">Trần chi tiêu hàng tháng theo từng hạng mục, riêng cho từng trung tâm. Trung tâm sẽ thấy cảnh báo khi chi gần/vượt trần.</div></div>
    </div>

    <div class="toolbar">
      <select class="select-input" id="filterCenter"></select>
    </div>

    <div class="data-table-wrap">
      <table class="budget-table" id="budgetTable">
        <thead><tr><th>Hạng mục chi</th><th>Trần ngân sách/tháng (VNĐ)</th><th>Đã chi tháng này</th><th></th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="4" class="empty-cell">Đang tải dữ liệu...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/acc/budget-setup.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
