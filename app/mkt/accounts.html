<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tài khoản nội bộ — ERP AIS</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
</head>
<body data-page="/mkt/accounts.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>ERP AIS<small>Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 ERP AIS</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <div class="search-box"><span>🔎</span><input type="text" id="searchInput" placeholder="Tìm nền tảng, tên tài khoản..." /></div>
    </div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'">🔔<span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn">⎋</button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1>Thông tin tài khoản nội bộ</h1><div class="sub">Tài khoản mạng xã hội / quảng cáo dùng chung — mật khẩu được mã hoá ở database.</div></div>
      <button class="btn btn-accent" id="btnAdd">+ Thêm tài khoản</button>
    </div>

    <div class="data-table-wrap">
      <table class="data-table">
        <thead><tr><th>Nền tảng</th><th>Tên tài khoản</th><th>Username</th><th>Người quản lý</th><th>Mật khẩu</th><th></th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="6" class="empty-cell">Đang tải dữ liệu...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<div class="modal-overlay" id="acctModal">
  <div class="modal-box">
    <button class="modal-close" id="closeModal">✕</button>
    <h3 id="modalTitle">Thêm tài khoản nội bộ</h3>
    <div class="form-error" id="formError"></div>
    <form id="acctForm">
      <input type="hidden" id="acctId" />
      <div class="field-grid-2">
        <div class="field"><label for="platform">Nền tảng *</label><input type="text" id="platform" placeholder="Facebook, Google Ads, Zalo OA..." required /></div>
        <div class="field"><label for="accountName">Tên tài khoản *</label><input type="text" id="accountName" required /></div>
      </div>
      <div class="field-grid-2">
        <div class="field"><label for="username">Username</label><input type="text" id="username" /></div>
        <div class="field"><label for="secret">Mật khẩu (để trống nếu không đổi)</label><input type="text" id="secret" autocomplete="new-password" /></div>
      </div>
      <div class="field"><label for="note">Ghi chú</label><textarea id="note" rows="2"></textarea></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" id="cancelModal">Huỷ</button>
        <button type="submit" class="btn btn-accent" id="submitAcct">Lưu</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script type="module" src="/mkt/accounts.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
