<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Thống kê CSVC — ERP AIS</title>
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ERP AIS" />
<link rel="apple-touch-icon" href="/assets/icon-192.png" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
</head>
<body data-page="/fac/stats.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>ERP AIS<small data-i18n="brand.subtitle">Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 ERP AIS</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <div class="search-box"><span>🔎</span><input type="text" id="searchInput" placeholder="Tìm tên tài sản..." /></div>
    </div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'">🔔<span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn">⎋</button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1>Hệ thống thống kê CSVC</h1><div class="sub">Kiểm kê tài sản theo trung tâm và tình trạng.</div></div>
      <button class="btn btn-accent" id="btnAdd">+ Thêm tài sản</button>
    </div>

    <div class="stat-grid" id="statCards"></div>

    <div class="toolbar">
      <select class="select-input" id="filterCenter"><option value="">Tất cả trung tâm</option></select>
      <select class="select-input" id="filterCondition">
        <option value="">Mọi tình trạng</option>
        <option value="good">Tốt</option><option value="needs_repair">Cần sửa chữa</option>
        <option value="broken">Hỏng</option><option value="disposed">Đã thanh lý</option>
      </select>
      <div class="cell-muted" id="resultCount"></div>
    </div>

    <div class="data-table-wrap">
      <table class="data-table">
        <thead><tr><th>Tài sản</th><th>Loại</th><th>Trung tâm</th><th>SL</th><th>Tình trạng</th><th></th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="6" class="empty-cell">Đang tải dữ liệu...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<div class="modal-overlay" id="assetModal">
  <div class="modal-box">
    <button class="modal-close" id="closeModal">✕</button>
    <h3 id="modalTitle">Thêm tài sản</h3>
    <div class="form-error" id="formError"></div>
    <form id="assetForm">
      <input type="hidden" id="assetId" />
      <div class="field"><label for="assetName">Tên tài sản *</label><input type="text" id="assetName" required /></div>
      <div class="field-grid-2">
        <div class="field"><label for="category">Loại</label><input type="text" id="category" /></div>
        <div class="field"><label for="quantity">Số lượng *</label><input type="number" id="quantity" min="1" value="1" required /></div>
      </div>
      <div class="field-grid-2">
        <div class="field"><label for="assetCenter">Trung tâm *</label><select id="assetCenter" required></select></div>
        <div class="field"><label for="condition">Tình trạng</label>
          <select id="condition"><option value="good">Tốt</option><option value="needs_repair">Cần sửa chữa</option><option value="broken">Hỏng</option><option value="disposed">Đã thanh lý</option></select>
        </div>
      </div>
      <div class="field"><label for="purchasedDate">Ngày mua</label><input type="date" id="purchasedDate" /></div>
      <div class="field"><label for="note">Ghi chú</label><textarea id="note" rows="2"></textarea></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" id="cancelModal"><span data-i18n="common.cancel">Huỷ</span></button>
        <button type="submit" class="btn btn-accent" id="submitAsset"><span data-i18n="common.save">Lưu</span></button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/fac/stats.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
