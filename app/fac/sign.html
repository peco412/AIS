<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ký số hồ sơ — Cơ sở vật chất — ERP AIS</title>
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ERP AIS" />
<link rel="apple-touch-icon" href="/assets/icon-192.png" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
<link rel="stylesheet" href="/css/pdfEditor.css" />
</head>
<body data-page="/fac/sign.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>ERP AIS<small data-i18n="brand.subtitle">Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 ERP AIS</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left"><button class="menu-toggle" id="menuToggle">☰</button></div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'">🔔<span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn">⎋</button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1>Ký số hồ sơ — Phòng Cơ sở vật chất</h1><div class="sub">Tự tải lên 1 file PDF bất kỳ, ký tại vị trí bất kỳ, tự chọn lưu vào Kho lưu trữ hệ thống.</div></div>
    </div>

    <div class="form-error" id="freeSignError"></div>
    <label class="btn btn-accent" for="freeSignFile" style="display:inline-flex; cursor:pointer;">📎 Chọn file PDF để ký</label>
    <input type="file" id="freeSignFile" accept="application/pdf" style="display:none;" />

    <div class="page-header" style="margin-top:28px;"><div><h1 style="font-size:18px;">Hồ sơ đã ký gần đây</h1></div></div>
    <div class="data-table-wrap">
      <table class="data-table">
        <thead><tr><th>Tên file</th><th>Người ký</th><th>Thời gian</th><th></th></tr></thead>
        <tbody id="signedTableBody"><tr><td colspan="4" class="empty-cell">Đang tải dữ liệu...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module">
  import { initFreeSign } from '/js/freeSign.js';
  initFreeSign('FAC');
</script>
<script src="/js/pwa.js"></script>
</body>
</html>
