<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Đơn nghỉ phép — ERP AIS</title>
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ERP AIS" />
<link rel="apple-touch-icon" href="/assets/icon-192.png" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
</head>
<body data-page="/hr/leave-requests.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>ERP AIS<small data-i18n="brand.subtitle">Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 ERP AIS</div>
  </aside>

  <header class="topbar">
    <div class="topbar__left">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <div class="search-box"><span>🔎</span><input type="text" placeholder="Tìm kiếm..." /></div>
    </div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'">🔔<span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn">⎋</button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div>
        <h1>Đơn nghỉ phép</h1>
        <div class="sub" id="leaveBalanceHint">Đang tải số ngày phép còn lại...</div>
      </div>
      <button class="btn btn-accent" id="btnAddLeave">+ Tạo đơn nghỉ phép</button>
    </div>

    <div class="toolbar">
      <div class="toolbar__filters">
        <select class="select-input" id="viewScope">
          <option value="mine">Đơn của tôi</option>
          <option value="dept" id="deptScopeOption" style="display:none;">Toàn phòng nhân sự</option>
        </select>
        <select class="select-input" id="filterStatus">
          <option value="">Tất cả trạng thái</option>
          <option value="draft">Nháp</option>
          <option value="submitted">Đã gửi</option>
          <option value="approved_2">Đã duyệt</option>
          <option value="rejected">Từ chối</option>
        </select>
      </div>
      <div class="cell-muted" id="resultCount"></div>
    </div>

    <div class="data-table-wrap">
      <table class="data-table">
        <thead>
          <tr><th>Mã đơn</th><th>Nhân viên</th><th>Diện nghỉ</th><th>Từ ngày</th><th>Số ngày</th><th>Lý do</th><th data-i18n="common.status">Trạng thái</th><th></th></tr>
        </thead>
        <tbody id="tableBody"><tr><td colspan="8" class="empty-cell">Đang tải dữ liệu...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<div class="modal-overlay" id="leaveModal">
  <div class="modal-box">
    <button class="modal-close" id="closeModal">✕</button>
    <h3>Tạo đơn nghỉ phép</h3>
    <p class="modal-sub">Mã đơn (HR-yyyy-mm-000001) sẽ được hệ thống tự sinh khi lưu.</p>
    <div class="form-error" id="formError"></div>
    <form id="leaveForm">
      <div class="field">
        <label for="leaveType">Diện xin nghỉ *</label>
        <select id="leaveType" required>
          <option value="annual">Nghỉ phép</option>
          <option value="unpaid">Nghỉ không lương</option>
          <option value="social_insurance">Nghỉ BHXH</option>
        </select>
      </div>
      <div class="field">
        <label for="leaveReason">Lý do xin nghỉ</label>
        <select id="leaveReason">
          <option value="work_swap">Bù ngày làm</option>
          <option value="personal_family">Công việc cá nhân / gia đình</option>
          <option value="sick">Bệnh / ốm</option>
          <option value="maternity">Thai sản</option>
          <option value="ceremony">Dạm ngõ / đám hỏi / đám cưới</option>
          <option value="funeral">Đám tang</option>
        </select>
      </div>
      <div class="field-grid-2">
        <div class="field"><label for="startDate">Ngày xin nghỉ *</label><input type="date" id="startDate" required /></div>
        <div class="field"><label for="days">Số ngày nghỉ *</label><input type="number" id="days" min="0.5" step="0.5" required /></div>
      </div>
      <div class="field"><label for="returnDate">Ngày vào làm lại</label><input type="date" id="returnDate" /></div>
      <div class="field"><label for="reasonNote">Ghi chú thêm</label><textarea id="reasonNote" rows="2"></textarea></div>
      <div class="field"><label for="attachment">Tài liệu đính kèm (PDF, nếu có)</label><input type="file" id="attachment" accept="application/pdf" /></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" id="cancelModal"><span data-i18n="common.cancel">Huỷ</span></button>
        <button type="submit" class="btn btn-accent" id="submitLeave">Gửi đơn</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/hr/leave-requests.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
