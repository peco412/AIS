<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trung tâm — ERP AIS</title>
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ERP AIS" />
<link rel="apple-touch-icon" href="/assets/icon-192.png" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
</head>
<body data-page="/master-data/centers.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>ERP AIS<small data-i18n="brand.subtitle">Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 ERP AIS</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left"><button class="menu-toggle" id="menuToggle">☰</button></div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'">🔔<span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn">⎋</button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1>Danh sách trung tâm</h1><div class="sub">Cơ sở hạ tầng gốc — mở rộng không giới hạn khi hệ thống phát triển thêm chi nhánh mới.</div></div>
      <button class="btn btn-accent" id="btnAdd">+ Thêm trung tâm</button>
    </div>

    <div class="data-table-wrap">
      <table class="data-table">
        <thead><tr><th>Mã</th><th>Tên trung tâm</th><th>Phân hệ</th><th>Địa chỉ</th><th>Trạng thái</th><th></th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="6" class="empty-cell">Đang tải dữ liệu...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<div class="modal-overlay" id="createModal">
  <div class="modal-box">
    <button class="modal-close" id="closeModal">✕</button>
    <h3 id="modalTitle">Thêm trung tâm</h3>
    <div class="form-error" id="formError"></div>
    <input type="hidden" id="centerId" />
    <div class="field"><label for="centerCode">Mã trung tâm *</label><input type="text" id="centerCode" placeholder="VD: MOCAY, DUYENHAI..." required /></div>
    <div class="field"><label for="centerName">Tên trung tâm *</label><input type="text" id="centerName" required /></div>
    <div class="field"><label for="centerDivision">Phân hệ *</label><select id="centerDivision" required></select></div>
    <div class="field"><label for="centerAddress">Địa chỉ</label><input type="text" id="centerAddress" /></div>
    <div class="field"><label><input type="checkbox" id="centerActive" checked /> Đang hoạt động</label></div>
    <div class="modal-actions">
      <button type="button" class="btn btn-outline" id="cancelModal"><span data-i18n="common.cancel">Huỷ</span></button>
      <button type="button" class="btn btn-accent" id="submitBtn">Lưu</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/master-data/centers.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
