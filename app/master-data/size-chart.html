<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bảng size theo chiều cao/cân nặng — ERP AIS</title>
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ERP AIS" />
<link rel="apple-touch-icon" href="/assets/icon-192.png" />
<meta name="theme-color" content="#0094D9" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
</head>
<body data-page="/master-data/size-chart.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>ERP AIS<small data-i18n="brand.subtitle">Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 ERP AIS</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left"><button class="menu-toggle" id="menuToggle"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg></button></div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'"><svg class="icon" viewBox="0 0 24 24"><path d="M6 8a6 6 0 1 1 12 0c0 4 1.5 6 2 6.5H4c.5-.5 2-2.5 2-6.5z"/><path d="M9.5 18a2.5 2.5 0 0 0 5 0"/></svg><span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn"><svg class="icon" viewBox="0 0 24 24"><path d="M9 4H5a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h4"/><path d="M15 16l4-4-4-4"/><path d="M19 12H9"/></svg></button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1>Bảng size theo chiều cao/cân nặng</h1><div class="sub">Dùng để tự động gợi ý size áo cho phụ huynh khi mua hàng qua App — chỉnh sửa khoảng chiều cao/cân nặng ứng với từng size tại đây.</div></div>
      <button class="btn btn-accent" id="btnAdd">+ Thêm size</button>
    </div>

    <div class="data-table-wrap">
      <table class="data-table">
        <thead><tr><th>Size</th><th>Chiều cao (cm)</th><th>Cân nặng (kg)</th><th></th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="4" class="empty-cell">Đang tải dữ liệu...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <button class="modal-close" id="closeEditModal"><svg class="icon icon--sm" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    <h3 id="modalTitle">Thêm size</h3>
    <div class="form-error" id="formError"></div>
    <input type="hidden" id="sizeId" />
    <div class="field"><label for="sizeLabel">Tên size (VD: S, M, L, 10, 12...) *</label><input type="text" id="sizeLabel" /></div>
    <div class="field-grid-2">
      <div class="field"><label for="minHeight">Chiều cao từ (cm)</label><input type="number" id="minHeight" /></div>
      <div class="field"><label for="maxHeight">đến (cm)</label><input type="number" id="maxHeight" /></div>
    </div>
    <div class="field-grid-2">
      <div class="field"><label for="minWeight">Cân nặng từ (kg)</label><input type="number" id="minWeight" /></div>
      <div class="field"><label for="maxWeight">đến (kg)</label><input type="number" id="maxWeight" /></div>
    </div>
    <div class="modal-actions">
      <button type="button" class="btn btn-outline" id="cancelEditModal">Huỷ</button>
      <button type="button" class="btn btn-accent" id="submitEdit">Lưu</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/master-data/size-chart.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
