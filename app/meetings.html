<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lịch họp — ERP AIS</title>
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ERP AIS" />
<link rel="apple-touch-icon" href="/assets/icon-192.png" />
<meta name="theme-color" content="#0094D9" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
<style>
  .participant-picker {
    max-height: 260px; overflow-y: auto; border: 1px solid var(--border);
    border-radius: var(--radius-md); background: var(--surface-card);
  }
  .participant-row {
    display: flex; align-items: center; gap: 12px; padding: 10px 14px;
    cursor: pointer; border-bottom: 1px solid var(--separator); transition: background 0.12s;
  }
  .participant-row:last-child { border-bottom: none; }
  .participant-row:hover { background: var(--surface-sunken); }
  .participant-row.is-selected { background: var(--accent-tint); }
  .participant-row input[type="checkbox"] { width: 17px; height: 17px; accent-color: var(--accent); flex-shrink: 0; cursor: pointer; }
  .participant-row__avatar {
    width: 30px; height: 30px; border-radius: 50%; background: var(--accent);
    color: #fff; display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .participant-row__name { font-size: 13.5px; font-weight: 500; color: var(--ink); flex: 1; }
  .participant-row__email { font-size: 11.5px; color: var(--muted); }
  .meeting-card { background: var(--surface-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px 20px; margin-bottom: 12px; }
  .meeting-card h4 { font-size: 15px; margin-bottom: 4px; }
  .meeting-card .meta { font-size: 12.5px; color: var(--muted); margin-bottom: 6px; }
  .meeting-card .desc { font-size: 13.5px; color: var(--ink-soft); }
</style>
</head>
<body data-page="/meetings.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>ERP AIS<small data-i18n="brand.subtitle">Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 ERP AIS</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left">
      <button class="menu-toggle" id="menuToggle"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg></button>
      <div class="search-box"><svg class="icon icon--sm" viewBox="0 0 24 24"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M20 20l-4.8-4.8"/></svg><input type="text" placeholder="Tìm kiếm..." /></div>
    </div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'"><svg class="icon" viewBox="0 0 24 24"><path d="M6 8a6 6 0 1 1 12 0c0 4 1.5 6 2 6.5H4c.5-.5 2-2.5 2-6.5z"/><path d="M9.5 18a2.5 2.5 0 0 0 5 0"/></svg><span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn"><svg class="icon" viewBox="0 0 24 24"><path d="M9 4H5a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h4"/><path d="M15 16l4-4-4-4"/><path d="M19 12H9"/></svg></button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1>Lịch họp</h1><div class="sub">Tạo sự kiện offline hoặc họp trực tuyến, mời người tham gia.</div></div>
      <button class="btn btn-accent" id="btnAdd">+ Tạo lịch họp</button>
    </div>

    <div class="toolbar">
      <select class="select-input" id="viewScope">
        <option value="upcoming">Sắp diễn ra</option>
        <option value="mine">Do tôi tạo</option>
        <option value="past">Đã diễn ra</option>
      </select>
      <div class="cell-muted" id="resultCount"></div>
    </div>

    <div id="meetingList"><div class="empty-cell">Đang tải dữ liệu...</div></div>
  </main>
</div>

<div class="modal-overlay" id="meetingModal">
  <div class="modal-box">
    <button class="modal-close" id="closeModal"><svg class="icon icon--sm" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    <h3>Tạo lịch họp</h3>
    <p class="modal-sub">Chọn "Họp trực tuyến" để tự sinh link Google Meet (cần đăng nhập Google lần đầu).</p>
    <div class="form-error" id="formError"></div>
    <form id="meetingForm">
      <div class="field">
        <label for="kind">Hình thức *</label>
        <select id="kind">
          <option value="offline">Offline (hội thảo/sự kiện/workshop)</option>
          <option value="online">Trực tuyến (tự sinh link Google Meet)</option>
        </select>
      </div>
      <div class="field"><label for="title">Tiêu đề *</label><input type="text" id="title" required /></div>
      <div class="field"><label for="description">Mô tả nội dung</label><textarea id="description" rows="2"></textarea></div>
      <div class="field-grid-2">
        <div class="field"><label for="meetingDate">Ngày diễn ra *</label><input type="date" id="meetingDate" required /></div>
        <div class="field" id="locationField"><label for="location">Địa điểm</label><input type="text" id="location" /></div>
      </div>
      <div class="field-grid-2">
        <div class="field"><label for="startTime">Giờ bắt đầu *</label><input type="time" id="startTime" required /></div>
        <div class="field"><label for="endTime">Giờ kết thúc *</label><input type="time" id="endTime" required /></div>
      </div>
      <div class="field" id="meetLinkField" style="display:none;">
        <label for="meetLink">Link cuộc họp</label>
        <div style="display:flex; gap:8px;">
          <input type="text" id="meetLink" readonly placeholder="Chưa tạo link" style="flex:1;" />
          <button type="button" class="btn btn-outline btn-sm" id="btnGenerateLink">Tạo link</button>
        </div>
      </div>
      <div class="field">
        <label>Mời người tham gia</label>
        <input type="text" class="text-input" id="participantFilter" placeholder="Lọc theo tên..." style="margin-bottom:8px; width:100%;" />
        <div class="participant-picker" id="participantPicker"></div>
        <div class="cell-muted" id="participantCount" style="margin-top:6px; font-size:11.5px;"></div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" id="cancelModal"><span data-i18n="common.cancel">Huỷ</span></button>
        <button type="submit" class="btn btn-accent" id="submitMeeting">Tạo lịch họp</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/meetings.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
