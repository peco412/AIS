<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kho lưu trữ hồ sơ điều hành — ERP AIS</title>
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ERP AIS" />
<link rel="apple-touch-icon" href="/assets/icon-192.png" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
</head>
<body data-page="/exec/archive.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>ERP AIS<small data-i18n="brand.subtitle">Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 ERP AIS</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <div class="search-box"><span>🔎</span><input type="text" id="searchInput" placeholder="Tìm tên file..." /></div>
    </div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'">🔔<span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn">⎋</button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1>Kho lưu trữ hồ sơ điều hành</h1><div class="sub">Riêng của Ban điều hành — tự tải lên, không phụ thuộc luồng ký số của các phòng ban.</div></div>
      <button class="btn btn-accent" id="btnUpload">+ Tải file lên</button>
    </div>

    <div class="toolbar">
      <div class="toolbar__filters">
        <select class="select-input" id="filterYear"></select>
        <select class="select-input" id="filterMonth"><option value="">Cả năm</option></select>
      </div>
      <div class="cell-muted" id="resultCount"></div>
    </div>

    <div class="data-table-wrap">
      <table class="data-table">
        <thead><tr><th>Tên file</th><th>Năm/Tháng</th><th>Người tải lên</th><th>Ngày tải</th><th></th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="5" class="empty-cell">Đang tải dữ liệu...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<div class="modal-overlay" id="uploadModal">
  <div class="modal-box">
    <button class="modal-close" id="closeUploadModal">✕</button>
    <h3>Tải file lên kho điều hành</h3>
    <div class="form-error" id="uploadError"></div>
    <form id="uploadForm">
      <div class="field"><label for="fileName">Tên hiển thị *</label><input type="text" id="fileName" required /></div>
      <div class="field-grid-2">
        <div class="field"><label for="fileYear">Năm *</label><input type="number" id="fileYear" required /></div>
        <div class="field"><label for="fileMonth">Tháng *</label><input type="number" id="fileMonth" min="1" max="12" required /></div>
      </div>
      <div class="field"><label for="uploadFile">File PDF *</label><input type="file" id="uploadFile" accept="application/pdf" required /></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" id="cancelUpload"><span data-i18n="common.cancel">Huỷ</span></button>
        <button type="submit" class="btn btn-accent" id="submitUpload">Tải lên</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/exec/archive.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
