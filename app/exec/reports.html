<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Báo cáo tổng hợp — ERP AIS</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
</head>
<body data-page="/exec/reports.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>ERP AIS<small>Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 ERP AIS</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left"><button class="menu-toggle" id="menuToggle">☰</button></div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'">🔔<span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn">⎋</button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1>Báo cáo tổng hợp</h1><div class="sub">Số liệu nhanh từ tất cả các phòng ban, cập nhật theo thời gian thực.</div></div>
      <select class="select-input" id="filterCenter"><option value="">Tất cả trung tâm</option></select>
    </div>

    <div class="form-section-title" style="margin-top:0;">🧑‍💼 Nhân sự</div>
    <div class="stat-grid" id="statsHR"></div>

    <div class="form-section-title">💰 Kế toán</div>
    <div class="stat-grid" id="statsACC"></div>

    <div class="form-section-title">📣 Truyền thông</div>
    <div class="stat-grid" id="statsMKT"></div>

    <div class="form-section-title">🛠 Cơ sở vật chất</div>
    <div class="stat-grid" id="statsFAC"></div>

    <div class="form-section-title">🎓 Học vụ</div>
    <div class="stat-grid" id="statsEDU"></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/exec/reports.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
