<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Báo cáo tổng hợp — ERP AIS</title>
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ERP AIS" />
<link rel="apple-touch-icon" href="/assets/icon-192.png" />
<meta name="theme-color" content="#0094D9" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<link rel="stylesheet" href="/css/module.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body data-page="/exec/reports.html">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand"><span class="dot"></span><div>ERP AIS<small data-i18n="brand.subtitle">Hệ thống quản trị nội bộ</small></div></div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar__footer">© 2026 ERP AIS</div>
  </aside>
  <header class="topbar">
    <div class="topbar__left"><button class="menu-toggle" id="menuToggle"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg></button></div>
    <div class="topbar__right">
      <button class="icon-btn" onclick="location.href='/notifications.html'"><svg class="icon" viewBox="0 0 24 24"><path d="M6 8a6 6 0 1 1 12 0c0 4 1.5 6 2 6.5H4c.5-.5 2-2.5 2-6.5z"/><path d="M9.5 18a2.5 2.5 0 0 0 5 0"/></svg><span class="badge" id="notifBadge" style="display:none;">0</span></button>
      <div class="user-chip" onclick="location.href='/profile.html'">
        <div class="user-chip__avatar" id="userChipAvatar">--</div>
        <div class="user-chip__meta"><div class="name" id="userChipName">Đang tải...</div><div class="role" id="userChipRole">—</div></div>
      </div>
      <button class="icon-btn" id="logoutBtn"><svg class="icon" viewBox="0 0 24 24"><path d="M9 4H5a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h4"/><path d="M15 16l4-4-4-4"/><path d="M19 12H9"/></svg></button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div><h1>Báo cáo tổng hợp</h1><div class="sub">Số liệu nhanh từ tất cả các phòng ban, cập nhật theo thời gian thực.</div></div>
      <select class="select-input" id="filterCenter"><option value="">Tất cả trung tâm</option></select>
    </div>

    <div class="stat-grid chart-row" id="chartRow" style="margin-bottom: 24px;">
      <div class="data-table-wrap" style="padding:20px;">
        <h3 style="font-size:14px; margin-bottom:14px;">Việc đang chờ xử lý theo phòng ban</h3>
        <canvas id="pendingByDeptChart" height="200"></canvas>
      </div>
      <div class="data-table-wrap" style="padding:20px;">
        <h3 style="font-size:14px; margin-bottom:14px;">Dòng tiền tháng này</h3>
        <canvas id="cashFlowChart" height="200"></canvas>
      </div>
    </div>

    <div class="form-section-title" style="margin-top:0;">🧑‍💼 Nhân sự</div>
    <div class="stat-grid" id="statsHR"></div>

    <div class="form-section-title">💰 Kế toán</div>
    <div class="stat-grid" id="statsACC"></div>

    <div class="form-section-title">📣 Truyền thông</div>
    <div class="stat-grid" id="statsMKT"></div>

    <div class="form-section-title">🛠 Cơ sở vật chất</div>
    <div class="stat-grid" id="statsFAC"></div>

    <div class="form-section-title">🎓 Học vụ</div>
    <div class="stat-grid" id="statsEDU"></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/exec/reports.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
