<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ERP — Chọn tầng — AIS OFFICE</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1a1530" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/tokens.css" />
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: linear-gradient(180deg, #1c1730 0%, #2c2140 30%, #241c38 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 40px 16px;
  }
  .lobby-header { text-align: center; margin-bottom: 28px; opacity: 0; animation: fu 0.6s var(--ease-spring) forwards; }
  .lobby-eyebrow { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.2em; text-transform: uppercase; color: #e3c68a; margin-bottom: 8px; }
  .lobby-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: #fbf3e4; }
  .lobby-sub { font-size: 13px; color: #d8c9c2; margin-top: 8px; }

  .lobby-panel {
    width: 100%; max-width: 420px; background: rgba(20,16,32,0.75); backdrop-filter: blur(14px);
    border: 1px solid rgba(227,198,138,0.28); border-radius: 22px; padding: 10px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.45);
    opacity: 0; animation: fu 0.7s var(--ease-spring) 0.1s forwards;
  }
  .floor-btn {
    display: flex; align-items: center; gap: 16px; width: 100%; padding: 20px 18px;
    background: none; border: none; border-bottom: 1px solid rgba(227,198,138,0.14); cursor: pointer;
    text-align: left; transition: background 0.2s var(--ease);
  }
  .floor-btn:last-child { border-bottom: none; }
  .floor-btn:hover:not(:disabled) { background: rgba(227,198,138,0.08); }
  .floor-btn:disabled { cursor: not-allowed; opacity: 0.4; }
  .floor-btn__num {
    font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: #e3c68a;
    width: 48px; height: 48px; border: 1.5px solid rgba(227,198,138,0.4); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .floor-btn__text { flex: 1; }
  .floor-btn__name { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 16.5px; color: #fbf3e4; }
  .floor-btn__desc { font-size: 11.5px; color: #cfa96a; margin-top: 3px; }
  .floor-btn__lock { font-size: 11px; color: #c9b8ae; margin-top: 3px; }
  .floor-btn__arrow { color: #cfa96a; font-size: 18px; }

  .dept-list { display: none; }
  .dept-list.is-visible { display: block; animation: fu 0.4s var(--ease-spring) forwards; }
  .dept-btn {
    display: flex; align-items: center; gap: 12px; width: 100%; padding: 15px 18px;
    background: none; border: none; border-bottom: 1px solid rgba(227,198,138,0.1); cursor: pointer;
    text-align: left; transition: background 0.2s var(--ease);
  }
  .dept-btn:last-child { border-bottom: none; }
  .dept-btn:hover:not(:disabled) { background: rgba(227,198,138,0.08); }
  .dept-btn:disabled { cursor: not-allowed; opacity: 0.4; }
  .dept-btn__icon { font-size: 18px; width: 28px; text-align: center; }
  .dept-btn__name { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 600; font-size: 14px; color: #fbf3e4; flex: 1; }
  .dept-btn__lock { font-size: 10.5px; color: #c9b8ae; }

  .lobby-back { margin-top: 18px; background: none; border: none; color: #cbb9ae; font-size: 12.5px; cursor: pointer; text-decoration: underline; opacity: 0; animation: fu 0.6s var(--ease-spring) 0.2s forwards; }

  @keyframes fu { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; opacity: 1 !important; } }
</style>
</head>
<body>

<div class="lobby-header">
  <div class="lobby-eyebrow">ERP — VẬN HÀNH NỘI BỘ</div>
  <div class="lobby-title">Chọn tầng</div>
  <div class="lobby-sub">Mỗi tầng là 1 nhóm chức năng riêng, dễ tìm hơn</div>
</div>

<div class="lobby-panel" id="floorPanel">
  <button class="floor-btn" id="btnFloorExec">
    <div class="floor-btn__num">1</div>
    <div class="floor-btn__text">
      <div class="floor-btn__name">Tầng điều hành</div>
      <div class="floor-btn__desc">Báo cáo tổng hợp · Ký số hồ sơ</div>
    </div>
    <div class="floor-btn__arrow">→</div>
  </button>
  <button class="floor-btn" id="btnFloorDept">
    <div class="floor-btn__num">2</div>
    <div class="floor-btn__text">
      <div class="floor-btn__name">Tầng phòng ban</div>
      <div class="floor-btn__desc">Nhân sự · Kế toán · Truyền thông · CSVC</div>
    </div>
    <div class="floor-btn__arrow">→</div>
  </button>

  <div class="dept-list" id="deptList">
    <button class="dept-btn" data-section="Phòng nhân sự"><div class="dept-btn__icon">👥</div><div class="dept-btn__name">Phòng nhân sự</div></button>
    <button class="dept-btn" data-section="Phòng kế toán"><div class="dept-btn__icon">💰</div><div class="dept-btn__name">Phòng kế toán</div></button>
    <button class="dept-btn" data-section="Phòng truyền thông"><div class="dept-btn__icon">📣</div><div class="dept-btn__name">Phòng truyền thông</div></button>
    <button class="dept-btn" data-section="Phòng cơ sở vật chất"><div class="dept-btn__icon">🔧</div><div class="dept-btn__name">Phòng cơ sở vật chất</div></button>
  </div>
</div>

<button class="lobby-back" id="btnBack">← Về màn chọn thế giới</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="/js/erpLobby.js"></script>
</body>
</html>
