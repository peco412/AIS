<!doctype html>
<html lang="vi" data-division="aloha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Đổi mật khẩu — ERP AIS</title>
<link rel="manifest" href="manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ERP AIS" />
<link rel="apple-touch-icon" href="assets/icon-192.png" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/tokens.css" />
<link rel="stylesheet" href="css/login.css" />
<style>
  .login-shell { grid-template-columns: 1fr; place-items: center; }
  .login-form-col { max-width: 420px; }
  .hint { font-size: 12.5px; color: var(--muted); margin-top: -10px; margin-bottom: 18px; }
</style>
</head>
<body>

<div class="login-shell">
  <div class="login-form-col">
    <form class="login-form" id="changePwForm" novalidate>
      <h2>Đổi mật khẩu lần đầu</h2>
      <p class="sub">Vì lý do bảo mật, vui lòng đặt mật khẩu mới trước khi tiếp tục sử dụng hệ thống.</p>

      <div class="login-error" id="pwError" role="alert"></div>

      <div class="field">
        <label for="newPassword">Mật khẩu mới</label>
        <input type="password" id="newPassword" minlength="6" required />
      </div>
      <p class="hint">Tối thiểu 6 ký tự.</p>

      <div class="field">
        <label for="confirmPassword">Xác nhận mật khẩu mới</label>
        <input type="password" id="confirmPassword" minlength="6" required />
      </div>

      <button type="submit" class="btn-primary" id="pwSubmit">Xác nhận và tiếp tục</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="js/changePassword.js"></script>
<script src="js/pwa.js"></script>
</body>
</html>
