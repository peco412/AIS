<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Đăng ký — AIS Center</title>
<link rel="manifest" href="manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/parent.css" />
</head>
<body class="auth-body">

<div class="auth-card">
  <div class="auth-logo">📱 <span>Đăng ký AIS Center</span></div>
  <p class="auth-sub">Tạo tài khoản để theo dõi ví AIScoins và học phí của con.</p>

  <div class="form-error" id="registerError"></div>

  <div id="registerStep">
    <div class="field"><label for="fullName">Họ và tên phụ huynh</label><input type="text" id="fullName" autocomplete="name" /></div>
    <div class="field"><label for="phone">Số điện thoại</label><input type="tel" id="phone" placeholder="09xxxxxxxx" autocomplete="tel" /></div>
    <div class="field"><label for="password">Mật khẩu (tối thiểu 6 ký tự)</label><input type="password" id="password" autocomplete="new-password" /></div>
    <div class="field"><label for="confirmPassword">Nhập lại mật khẩu</label><input type="password" id="confirmPassword" autocomplete="new-password" /></div>
    <button class="btn-primary" id="btnRegister">Đăng ký</button>
  </div>

  <button class="btn-link" id="btnGoLogin">Đã có tài khoản? Đăng nhập</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="env.js"></script>
<script type="module" src="js/register.js"></script>
</body>
</html>
