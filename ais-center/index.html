<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Đăng nhập — AIS Center</title>
<link rel="manifest" href="manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/parent.css" />
</head>
<body class="auth-body">

<div class="auth-card">
  <div class="auth-logo">📱 <span>AIS Center</span></div>
  <p class="auth-sub">Ứng dụng dành cho phụ huynh — theo dõi học phí, ví AIScoins của con em.</p>

  <div class="form-error" id="loginError"></div>

  <div id="phoneStep">
    <div class="field">
      <label for="phone">Số điện thoại</label>
      <input type="tel" id="phone" placeholder="09xxxxxxxx" autocomplete="tel" />
    </div>
    <button class="btn-primary" id="btnSendOtp">Gửi mã OTP</button>
  </div>

  <div id="otpStep" style="display:none;">
    <p class="cell-muted">Mã OTP đã gửi tới <strong id="otpPhoneDisplay"></strong></p>
    <div class="field">
      <label for="otp">Nhập mã OTP</label>
      <input type="text" id="otp" inputmode="numeric" maxlength="6" placeholder="------" />
    </div>
    <button class="btn-primary" id="btnVerifyOtp">Xác nhận</button>
    <button class="btn-link" id="btnResendOtp">Gửi lại mã</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="js/parentAuth.js"></script>
</body>
</html>
