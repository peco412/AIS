<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Đăng nhập — AIS Center</title>
<link rel="manifest" href="manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0094D9" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/parent.css" />
</head>
<body class="auth-body">

<div class="auth-card">
  <div class="auth-logo"><span>AIS Center</span></div>
  <p class="auth-sub">Ứng dụng dành cho phụ huynh — theo dõi học phí, ví AIScoins của con em.</p>

  <div class="form-error" id="loginError"></div>

  <div class="field">
    <label for="phone">Số điện thoại</label>
    <input type="tel" id="phone" placeholder="09xxxxxxxx" autocomplete="tel" />
  </div>
  <div class="field">
    <label for="password">Mật khẩu</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
  </div>
  <button class="btn-primary" id="btnLogin">Đăng nhập</button>

  <div style="display:flex; justify-content:space-between; margin-top:6px;">
    <button class="btn-link" id="btnForgot" style="width:auto; padding:8px 0;">Quên mật khẩu?</button>
    <button class="btn-link" id="btnGoRegister" style="width:auto; padding:8px 0;">Chưa có tài khoản? Đăng ký</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="env.js"></script>
<script type="module" src="js/parentAuth.js"></script>
</body>
</html>
