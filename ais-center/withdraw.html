<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Yêu cầu rút ví — AIS Center</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/parent.css" />
</head>
<body>

<header class="app-topbar">
  <div class="app-topbar__title">↩️ Yêu cầu rút ví</div>
  <div class="app-topbar__right"><button class="icon-btn" onclick="location.href='home.html'">✕</button></div>
</header>

<main class="app-main">
  <div class="form-error" id="withdrawError"></div>

  <div class="card">
    <h3>Số tiền dự kiến hoàn lại</h3>
    <div class="balance-hero" style="margin-top:8px; margin-bottom:0;">
      <div class="balance-hero__label">Tổng hoàn dự kiến</div>
      <div class="balance-hero__value" id="previewRefund">–</div>
    </div>
  </div>

  <div class="card">
    <h3>Chi tiết theo từng lô nạp</h3>
    <div id="batchBreakdown"></div>
  </div>

  <div id="pendingNotice" class="card" style="display:none; text-align:center; color:var(--muted);"></div>

  <button class="btn-primary" id="btnSubmitWithdraw">Gửi yêu cầu rút toàn bộ ví</button>
  <p class="cell-muted" style="text-align:center; margin-top:10px;">Yêu cầu sẽ được Kế toán xem xét và duyệt trước khi hoàn tiền thực tế.</p>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/env.js"></script>
<script type="module" src="js/withdraw.js"></script>
</body>
</html>
