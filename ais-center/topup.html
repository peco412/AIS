<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nạp ví — AIS Center</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/parent.css" />
</head>
<body>

<header class="app-topbar">
  <div class="app-topbar__title">💰 Nạp ví</div>
  <div class="app-topbar__right"><button class="icon-btn" onclick="location.href='home.html'">✕</button></div>
</header>

<main class="app-main">
  <div class="form-error" id="topupError"></div>

  <div class="card">
    <h3>Số AIScoins muốn nạp</h3>
    <div class="field"><input type="number" id="coinAmount" placeholder="Nhập số tiền, VD: 15000000" min="1000000" step="100000" /></div>

    <div class="topup-preview" id="previewBox" style="display:none;">
      <div class="topup-preview__row"><span>Chiết khấu áp dụng</span><strong id="previewRate">–</strong></div>
      <div class="topup-preview__row"><span>Số tiền cần thanh toán</span><strong id="previewVnd">–</strong></div>
      <div class="topup-preview__hint" id="previewHint"></div>
    </div>
  </div>

  <div class="card">
    <h3>Hình thức thanh toán</h3>
    <div class="field">
      <select id="method">
        <option value="bank_transfer">Chuyển khoản ngân hàng</option>
        <option value="app">Ví điện tử liên kết (nếu có)</option>
      </select>
    </div>
  </div>

  <button class="btn-primary" id="btnConfirmTopup">Tiếp tục</button>
</main>

<div class="modal-overlay" id="confirmModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); align-items:center; justify-content:center; padding:20px;">
  <div style="background:#fff; border-radius:20px; padding:24px; max-width:360px; width:100%;">
    <h3 style="margin-bottom:14px;">Xác nhận nạp ví</h3>
    <div class="batch-row"><span class="cell-muted">Số AIScoins nhận được</span><strong id="confirmCoin"></strong></div>
    <div class="batch-row"><span class="cell-muted">Số tiền thanh toán</span><strong id="confirmVnd"></strong></div>
    <div class="batch-row"><span class="cell-muted">Chương trình ưu đãi</span><span id="confirmProgram"></span></div>
    <button class="btn-primary" id="btnFinalConfirm" style="margin-top:16px;">Xác nhận nạp</button>
    <button class="btn-link" id="btnCancelConfirm">Huỷ</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/ais-center/env.js"></script>
<script type="module" src="js/topup.js"></script>
</body>
</html>
