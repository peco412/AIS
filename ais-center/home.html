<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AIS Center</title>
<link rel="manifest" href="manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/parent.css" />
</head>
<body>

<header class="app-topbar">
  <div class="app-topbar__title">Xin chào, <span id="parentName">...</span></div>
  <div class="app-topbar__right">
    <button class="icon-btn" id="logoutBtn">⎋</button>
  </div>
</header>

<main class="app-main">
  <div id="noStudentNotice" class="empty-state" style="display:none;">
    <p>Chưa có học sinh nào được liên kết với tài khoản này.</p>
    <a href="link-student.html" class="btn-primary" style="display:inline-block; width:auto; padding:10px 24px; text-decoration:none; margin-top:10px;">🔗 Liên kết ngay</a>
  </div>

  <div id="content" style="display:none;">
    <div class="student-switcher" id="studentSwitcher"></div>

    <div class="card">
      <h3>🎁 Chương trình ưu đãi</h3>
      <div id="promoList"></div>
    </div>

    <div class="card" style="opacity:0.6;">
      <h3>📰 Mạng xã hội nội bộ</h3>
      <div class="empty-state" style="padding:20px 0;">Tính năng sắp ra mắt</div>
    </div>

    <div class="card" style="opacity:0.6;">
      <h3>📚 Thư viện số</h3>
      <div class="empty-state" style="padding:20px 0;">Tính năng sắp ra mắt</div>
    </div>
  </div>
</main>

<nav class="bottom-nav">
  <a href="home.html" class="active"><span class="icon">🏠</span>Trang chủ</a>
  <a href="wallet.html"><span class="icon">💳</span>Ví AIScoins</a>
  <a href="account.html"><span class="icon">👤</span>Tài khoản</a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="env.js"></script>
<script type="module" src="js/home.js"></script>
</body>
</html>
