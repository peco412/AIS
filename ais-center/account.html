<main class="app-main">
  <a href="grades.html" class="list-card">

  </a>

  <a href="debt.html" class="list-card">
    <div class="list-card__icon"><svg class="icon" viewBox="0 0 24 24"><path d="M3 6a1 1 0 0 1 1-1h5l2 2h9a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V6z"/></svg></div>

    <svg class="icon icon--sm list-card__chevron" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
  </a>

  <a href="linkedaccounts.html" class="list-card">
    <div class="list-card__icon"><svg class="icon" viewBox="0 0 24 24"><path d="M9 15l6-6"/><path d="M11 6l1-1a4 4 0 0 1 6 6l-1 1"/><path d="M13 18l-1 1a4 4 0 0 1-6-6l1-1"/></svg></div>

    <svg class="icon icon--sm list-card__chevron" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
  </a>

  <a href="change-password.html" class="list-card">
    <div class="list-card__icon"><svg class="icon" viewBox="0 0 24 24"><circle cx="8" cy="15" r="4"/><path d="M11 12l9-9"/><path d="M16 7l3 3M13 10l2 2"/></svg></div>
    <div class="list-card__body"><strong>Đổi mật khẩu</strong><div class="cell-muted">Cập nhật mật khẩu đăng nhập</div></div>
    <svg class="icon icon--sm list-card__chevron" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
  </a>

  <button class="list-card" id="btnLogout" style="width:100%; border:none; text-align:left; cursor:pointer;">
    <div class="list-card__icon" style="background:var(--danger-tint); color:var(--danger);"><svg class="icon" viewBox="0 0 24 24"><path d="M9 4H5a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h4"/><path d="M15 16l4-4-4-4"/><path d="M19 12H9"/></svg></div>
    <div class="list-card__body"><strong>Đăng xuất</strong></div>

  <div class="bottom-nav__inner">
