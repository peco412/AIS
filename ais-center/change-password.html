<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Đổi mật khẩu — AIS Center</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/parent.css" />
</head>
<body>

<header class="app-topbar">
  <div class="app-topbar__title">🔑 Đổi mật khẩu</div>
  <div class="app-topbar__right"><button class="icon-btn" onclick="location.href='account.html'">✕</button></div>
</header>

<main class="app-main">
  <div class="card">
    <div class="form-error" id="changeError"></div>
    <div class="cell-muted" id="changeSuccess" style="display:none; background:#e3f6e9; color:#1d8a4c; padding:10px 13px; border-radius:10px; margin-bottom:14px;"></div>

    <div class="field"><label for="newPassword">Mật khẩu mới (tối thiểu 6 ký tự)</label><input type="password" id="newPassword" autocomplete="new-password" /></div>
    <div class="field"><label for="confirmPassword">Nhập lại mật khẩu mới</label><input type="password" id="confirmPassword" autocomplete="new-password" /></div>
    <button class="btn-primary" id="btnChange">Cập nhật mật khẩu</button>
  </div>
</main>

<nav class="bottom-nav">
  <a href="home.html"><span class="icon">🏠</span>Trang chủ</a>
  <a href="wallet.html"><span class="icon">💳</span>Ví AIScoins</a>
  <a href="account.html" class="active"><span class="icon">👤</span>Tài khoản</a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="env.js"></script>
<script type="module" src="js/changePassword.js"></script>
</body>
</html>
