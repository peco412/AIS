<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ví AIScoins — AIS Center</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0094D9" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/parent.css" />
</head>
<body>

<header class="app-topbar">
  <div class="app-topbar__title">💳 Ví AIScoins</div>
  <div class="app-topbar__right"><button class="icon-btn" onclick="location.href='account.html'">👤</button></div>
</header>

<main class="app-main">
  <div id="noStudentNotice" class="empty-state" style="display:none;">
    <p>Chưa có học sinh nào được liên kết với tài khoản này.</p>
    <a href="link-student.html" class="btn-primary" style="display:inline-block; width:auto; padding:10px 24px; text-decoration:none; margin-top:10px;">🔗 Liên kết ngay</a>
  </div>

  <div id="content" style="display:none;">
    <div class="student-switcher" id="studentSwitcher"></div>

    <div class="balance-hero">
      <div class="balance-hero__top">
        <div class="balance-hero__label">Số dư ví AIScoins</div>
        <div class="balance-hero__verified">✓ Đã xác thực</div>
      </div>
      <div class="balance-hero__value" id="balanceValue">–</div>
      <div class="balance-hero__vnd" style="font-size:12px; opacity:0.85; margin-top:4px;" id="balanceValueVnd"></div>
      <div class="balance-hero__chip"></div>
    </div>

    <div class="action-grid">
      <a href="topup.html" class="action-tile action-tile--topup">
        <div class="action-tile__icon">💰</div>
        <div class="action-tile__label">Nạp tiền</div>
      </a>
      <a href="pay-tuition.html" class="action-tile action-tile--tuition">
        <div class="action-tile__icon">📝</div>
        <div class="action-tile__label">Đóng học phí</div>
      </a>
      <a href="withdraw.html" class="action-tile action-tile--withdraw">
        <div class="action-tile__icon">🔄</div>
        <div class="action-tile__label">Hoàn tiền</div>
      </a>
      <a href="shop.html" class="action-tile action-tile--shop">
        <div class="action-tile__icon">🛍️</div>
        <div class="action-tile__label">Mua sắm</div>
      </a>
      <a href="wallet-detail.html" class="action-tile action-tile--history">
        <div class="action-tile__icon">📋</div>
        <div class="action-tile__label">Lịch sử</div>
      </a>
    </div>
  </div>
</main>

<nav class="bottom-nav">
  <a href="home.html"><span class="icon">🏠</span>Trang chủ</a>
  <a href="wallet.html" class="active"><span class="icon">💳</span>Ví AIScoins</a>
  <a href="account.html"><span class="icon">👤</span>Tài khoản</a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="env.js"></script>
<script type="module" src="js/wallet.js"></script>
</body>
</html>
